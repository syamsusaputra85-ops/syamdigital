  <style>
    body {
      box-sizing: border-box;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    .animate-in {
      animation: fadeIn 0.6s ease-out forwards;
    }
    
    .participant-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .participant-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 50px rgba(139, 90, 43, 0.2);
    }
    
    .gold-shimmer {
      background: linear-gradient(90deg, #8B5A2B, #D4A853, #F5DEB3, #D4A853, #8B5A2B);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
    }
    
    .certificate-wrapper {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.4);
    }
    
    .certificate-frame {
      background: linear-gradient(135deg, #D4A853 0%, #F5DEB3 25%, #D4A853 50%, #8B5A2B 75%, #D4A853 100%);
      padding: 4px;
      border-radius: 4px;
    }
    
    .certificate-inner-frame {
      background: linear-gradient(135deg, #8B5A2B 0%, #D4A853 50%, #8B5A2B 100%);
      padding: 3px;
      border-radius: 3px;
    }
    
    .certificate-body {
      background: linear-gradient(180deg, #FFFEF7 0%, #FFF9E8 30%, #FFFEF7 70%, #FDF5E6 100%);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    
    .certificate-body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 0% 0%, rgba(212,168,83,0.1) 0%, transparent 50%),
        radial-gradient(circle at 100% 0%, rgba(212,168,83,0.1) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(212,168,83,0.1) 0%, transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(212,168,83,0.1) 0%, transparent 50%);
      pointer-events: none;
    }
    
    .watermark-pattern {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      opacity: 0.04;
      pointer-events: none;
    }
    
    .elegant-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .elegant-divider::before,
    .elegant-divider::after {
      content: '';
      height: 1px;
      width: 80px;
      background: linear-gradient(90deg, transparent, #D4A853, transparent);
    }
    
    .name-underline {
      position: relative;
    }
    
    .name-underline::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #D4A853, #8B5A2B, #D4A853, transparent);
    }
    
    .seal-container {
      position: relative;
      display: inline-block;
    }
    
    .seal-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(212,168,83,0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 3s ease-in-out infinite;
    }
  </style>

                  <div class="text-center order-1 sm:order-2">

                      ${config.location}, ${config.event_date}
                    </p>
                    <img src="https://res.cloudinary.com/di8stbg60/image/upload/v1764739765/AMIR_RAMANG_rizbqf.png" 
                         alt="Tanda Tangan" 
                         style="width: 120px; height: 80px; object-fit: contain; margin: 0 auto 8px auto; display: block;"
                         onerror="this.src=''; this.alt=''; this.style.display='none';">
                    <p class="font-bold text-xs sm:text-sm md:text-base" style="color: #1a1a2e; font-family: 'Cinzel', serif;">${config.signer_name}</p>
                    <div class="w-24 sm:w-32 md:w-40 h-0.5 mx-auto my-0.5 sm:my-1" style="background: linear-gradient(90deg, transparent, #D4A853, transparent);"></div>
                    <p class="text-[8px] sm:text-[10px] md:text-xs" style="color: #6a6a6a; font-family: 'Poppins', sans-serif;">${config.signer_title}</p>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Render participant cards
    function renderParticipants() {
      const grid = document.getElementById('participant-grid');
      grid.innerHTML = participants.map((p, index) => `
        <div class="participant-card rounded-lg md:rounded-xl p-3 md:p-5 animate-in cursor-pointer" 
             style="animation-delay: ${index * 30}ms; background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%); border: 1px solid rgba(212,168,83,0.2);"
             data-id="${p.id}">
          <div class="flex items-center gap-3 md:gap-4">
            <div class="w-10 h-10 md:w-14 md:h-14 rounded-full flex items-center justify-center text-sm md:text-lg font-bold flex-shrink-0" 
                 style="background: linear-gradient(135deg, #D4A853 0%, #8B5A2B 100%); color: #1a1a2e; font-family: 'Cinzel', serif;">
              ${String(p.id).padStart(2, '0')}
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-semibold text-amber-100 text-sm md:text-base truncate" style="font-family: 'Poppins', sans-serif;">
                ${p.name}
              </h3>
              <p class="text-xs md:text-sm text-amber-100/50">Peserta Pelatihan</p>
            </div>
            <button class="view-cert-btn px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-medium transition flex items-center gap-1.5 md:gap-2 hover:scale-105 flex-shrink-0"
                    style="background: linear-gradient(135deg, #D4A853 0%, #8B5A2B 100%); color: #1a1a2e;"
                    data-id="${p.id}">
              <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <span class="hidden sm:inline">Lihat</span>
            </button>
          </div>
        </div>
      `).join('');

      // Add click handlers
      document.querySelectorAll('.view-cert-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          showCertificate(id);
        });
      });

      document.querySelectorAll('.participant-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = parseInt(card.dataset.id);
          showCertificate(id);
        });
      });
    }

    // Show certificate modal
    function showCertificate(participantId) {
      currentParticipant = participants.find(p => p.id === participantId);
      if (!currentParticipant) return;

      const container = document.getElementById('certificate-container');
      container.innerHTML = generateCertificate(currentParticipant);
      
      const modal = document.getElementById('modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    // Close modal
    document.getElementById('close-modal').addEventListener('click', () => {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') {
        const modal = document.getElementById('modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
      }
    });

    // Download certificate
    document.getElementById('download-btn').addEventListener('click', async () => {
      if (!currentParticipant) return;

      const btn = document.getElementById('download-btn');
      const originalContent = btn.innerHTML;
      btn.innerHTML = '<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span>Mengunduh...</span>';
      btn.disabled = true;

      try {
        const container = document.getElementById('certificate-container');
        const canvas = await html2canvas(container, {
          scale: 2,
          useCORS: true,
          backgroundColor: null
        });

        const link = document.createElement('a');
        link.download = `Sertifikat_${currentParticipant.name.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (error) {
        console.error('Download failed:', error);
      }

      btn.innerHTML = originalContent;
      btn.disabled = false;
    });

    // Apply config to UI
    async function onConfigChange(cfg) {
      config = { ...defaultConfig, ...cfg };
      
      // Update page subtitle
      const subtitle = document.getElementById('page-subtitle');
      if (subtitle) subtitle.textContent = config.training_name;
      
      // Re-render participants
      renderParticipants();
      
      // Update certificate if modal is open
      if (currentParticipant) {
        const container = document.getElementById('certificate-container');
        container.innerHTML = generateCertificate(currentParticipant);
      }
    }

    // Initialize
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (cfg) => ({
          recolorables: [
            {
              get: () => cfg.background_color || defaultConfig.background_color,
              set: (v) => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
            },
            {
              get: () => cfg.card_color || defaultConfig.card_color,
              set: (v) => { cfg.card_color = v; window.elementSdk.setConfig({ card_color: v }); }
            },
            {
              get: () => cfg.text_color || defaultConfig.text_color,
              set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
            },
            {
              get: () => cfg.primary_color || defaultConfig.primary_color,
              set: (v) => { cfg.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }
            },
            {
              get: () => cfg.accent_color || defaultConfig.accent_color,
              set: (v) => { cfg.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }
            }
          ],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ["certificate_title", cfg.certificate_title || defaultConfig.certificate_title],
          ["training_name", cfg.training_name || defaultConfig.training_name],
          ["organizer", cfg.organizer || defaultConfig.organizer],
          ["event_date", cfg.event_date || defaultConfig.event_date],
          ["location", cfg.location || defaultConfig.location],
          ["signer_name", cfg.signer_name || defaultConfig.signer_name],
          ["signer_title", cfg.signer_title || defaultConfig.signer_title]
        ])
      });
    } else {
      onConfigChange(defaultConfig);
    }
  </script>
