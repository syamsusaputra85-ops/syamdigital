    function getCategoryColor(category) {
      const colors = {
        struk1: { bg: 'bg-blue-100', text: 'text-blue-700', border: 'border-blue-200' },
        resi2: { bg: 'bg-emerald-100', text: 'text-emerald-700', border: 'border-emerald-200' },
        resi3: { bg: 'bg-purple-100', text: 'text-purple-700', border: 'border-purple-200' },
        resi4: { bg: 'bg-orange-100', text: 'text-orange-700', border: 'border-orange-200' },
        resi5: { bg: 'bg-rose-100', text: 'text-rose-700', border: 'border-rose-200' }
      };
      return colors[category] || { bg: 'bg-slate-100', text: 'text-slate-700', border: 'border-slate-200' };
    }

    function getCategoryLabel(category) {
      const labels = {
        struk1: 'Struk Pajak 1',
        resi2: 'Resi 2',
        resi3: 'Resi 3',
        resi4: 'Resi 4',
        resi5: 'Resi 5'
      };
      return labels[category] || category;
    }

          <div class="relative aspect-[3/4] overflow-hidden bg-gradient-to-br from-slate-100 to-slate-50">

              src="${receipt.url}"

    function filterCategory(category) {
      currentCategory = category;
      
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        btn.classList.add('bg-slate-100', 'text-slate-600');
      });
      
      const activeBtn = document.querySelector(`[data-category="${category}"]`);
      if (activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.classList.remove('bg-slate-100', 'text-slate-600');
      }
      
      if (category === 'all') {
        filteredReceipts = [...receipts];
      } else {
        filteredReceipts = receipts.filter(r => r.category === category);
      }
      
      renderGallery();
    }

    function openModal(index) {
      currentModalIndex = index;
      const receipt = filteredReceipts[index];
      const modal = document.getElementById('modal');
      const modalImage = document.getElementById('modal-image');
      const modalTitle = document.getElementById('modal-title');
      
      modalImage.src = receipt.url;
      modalTitle.textContent = `${receipt.label} • ${getCategoryLabel(receipt.category)}`;
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      document.body.style.overflow = '';
    }

    function navigateImage(direction) {
      currentModalIndex += direction;
      
      if (currentModalIndex < 0) {
        currentModalIndex = filteredReceipts.length - 1;
      } else if (currentModalIndex >= filteredReceipts.length) {
        currentModalIndex = 0;
      }
      
      const receipt = filteredReceipts[currentModalIndex];
      const modalImage = document.getElementById('modal-image');
      const modalTitle = document.getElementById('modal-title');
      
      modalImage.src = receipt.url;
      modalTitle.textContent = `${receipt.label} • ${getCategoryLabel(receipt.category)}`;
    }

    function downloadImage(imageUrl, label) {
      const link = document.createElement('a');
      link.href = imageUrl;
      link.download = `${label}.jpg`;
      link.target = '_blank';
      
      // Tambahkan timestamp untuk menghindari cache
      const urlWithTimestamp = imageUrl + '?t=' + Date.now();
      link.href = urlWithTimestamp;
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    document.addEventListener('keydown', (e) => {
      const modal = document.getElementById('modal');
      if (!modal.classList.contains('hidden')) {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'ArrowLeft') navigateImage(-1);
        if (e.key === 'ArrowRight') navigateImage(1);
      }
    });

    async function onConfigChange(newConfig) {
      config = { ...config, ...newConfig };
      
      document.getElementById('main-title').textContent = config.page_title || defaultConfig.page_title;
      document.getElementById('subtitle').textContent = `${config.village_name || defaultConfig.village_name} • Tahun ${config.year_text || defaultConfig.year_text}`;
    }

    function mapToCapabilities(cfg) {
      return {
        recolorables: [
          {
            get: () => cfg.primary_color || defaultConfig.primary_color,
            set: (value) => { cfg.primary_color = value; if(window.elementSdk) window.elementSdk.setConfig({ primary_color: value }); }
          },
          {
            get: () => cfg.accent_color || defaultConfig.accent_color,
            set: (value) => { cfg.accent_color = value; if(window.elementSdk) window.elementSdk.setConfig({ accent_color: value }); }
          },
          {
            get: () => cfg.background_color || defaultConfig.background_color,
            set: (value) => { cfg.background_color = value; if(window.elementSdk) window.elementSdk.setConfig({ background_color: value }); }
          },
          {
            get: () => cfg.card_color || defaultConfig.card_color,
            set: (value) => { cfg.card_color = value; if(window.elementSdk) window.elementSdk.setConfig({ card_color: value }); }
          },
          {
            get: () => cfg.text_color || defaultConfig.text_color,
            set: (value) => { cfg.text_color = value; if(window.elementSdk) window.elementSdk.setConfig({ text_color: value }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(cfg) {
      return new Map([
        ['page_title', cfg.page_title || defaultConfig.page_title],
        ['village_name', cfg.village_name || defaultConfig.village_name],
        ['year_text', cfg.year_text || defaultConfig.year_text]
      ]);
    }

    // Initialize
    renderGallery();
    
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
