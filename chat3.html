<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Script Balasan WhatsApp</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a0f0f 0%, #2d1515 50%, #3a1a1a 100%);
    }
    .script-mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      line-height: 1.65;
    }
    .card-glow {
      position: relative;
      overflow: hidden;
    }
    .card-glow::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #dc2626, #991b1b, #dc2626);
    }
    .pulse-dot {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }
    .toast-enter {
      animation: toastIn 0.3s ease-out forwards;
    }
    .toast-exit {
      animation: toastOut 0.3s ease-in forwards;
    }
    @keyframes toastIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes toastOut {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(20px); opacity: 0; }
    }
    .script-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .script-card:hover {
      transform: translateY(-2px);
    }
    .copy-btn-success {
      background-color: #7c2d12 !important;
      color: white !important;
    }
    .bg-grid {
      background-image:
        radial-gradient(circle at 1px 1px, rgba(220, 38, 38, 0.08) 1px, transparent 0);
      background-size: 24px 24px;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-grid">
  <div class="w-full h-full overflow-auto">
   <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
    <!-- Header -->
    <header class="mb-10 text-center">
     <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-red-600/20 border border-red-500/40 text-red-300 text-xs font-semibold uppercase tracking-wider mb-5">
      <span class="w-2 h-2 rounded-full bg-red-400 pulse-dot"></span> Info Desa Wani
     </div>
     <h1 id="app-title" class="text-4xl sm:text-5xl font-extrabold text-white mb-3 tracking-tight">Script Balasan WhatsApp</h1>
     <p id="app-subtitle" class="text-red-100/60 text-base sm:text-lg max-w-2xl mx-auto">Klik tombol copy, tempel di WhatsApp, kirim. Selesai. 🚀</p>
    </header><!-- Script Cards -->
    <main id="scripts-container" class="space-y-5"></main><!-- Footer -->
    <footer class="mt-12 text-center text-red-100/40 text-sm">
     <p>Tap tombol <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded bg-white/5 border border-white/10 text-red-300"><i data-lucide="copy" class="w-3 h-3"></i> Copy</span> untuk menyalin script</p>
    </footer>
   </div>
  </div><!-- Toast -->
  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none"></div>
  <script>
    const defaultConfig = {
      app_title: "Script Balasan WhatsApp",
      app_subtitle: "Klik tombol copy, tempel di WhatsApp, kirim. Selesai. 🚀"
    };

    const scripts = [
      {
        id: 1,
        icon: "hand",
        emoji: "🎯",
        tag: "WAJIB KIRIM",
        tagColor: "bg-amber-500/15 text-amber-300 border-amber-500/30",
        title: "Welcome",
        subtitle: "Pesan pertama untuk member baru",
        content: `Halo kak 👋
Selamat datang di *INFO DESA WANI* 😊

Terima kasih sudah bergabung 🙏
Semoga grup ini bisa bermanfaat untuk info & peluang usaha

📌 Jangan lupa baca aturan grup ya kak 👍`
      },
      {
        id: 2,
        icon: "message-circle",
        emoji: "💬",
        tag: "SETELAH DIBALAS",
        tagColor: "bg-blue-500/15 text-blue-300 border-blue-500/30",
        title: "Bangun Relasi",
        subtitle: "Tanyakan tujuan & domisili",
        content: `Btw kak, boleh tahu domisili di sekitar Wani juga? 😊

Atau kakak gabung untuk:
👉 Cari info
👉 Jualan / usaha
👉 Atau sekedar gabung komunitas`
      },
      {
        id: 3,
        icon: "trending-up",
        emoji: "💰",
        tag: "JIKA ADA USAHA",
        tagColor: "bg-emerald-500/15 text-emerald-300 border-emerald-500/30",
        title: "Arah ke Bisnis",
        subtitle: "Untuk member yang punya usaha",
        content: `Wah keren kak 👍

Kalau punya usaha, di grup ini banyak yang jualan & sudah laku juga 🔥

💡 Supaya lebih maksimal:
Kakak bisa promosi di sini juga ya 😊`
      },
      {
        id: 4,
        icon: "rocket",
        emoji: "🚀",
        tag: "SOFT SELL",
        tagColor: "bg-purple-500/15 text-purple-300 border-purple-500/30",
        title: "Promosi Paket Ads",
        subtitle: "Tawarkan layanan promosi",
        content: `Di luar hari Jumat & Minggu,
kami juga ada layanan promosi resmi dari admin 👍

💰 Paket mulai dari 10K saja

👉 Lebih banyak yang lihat
👉 Lebih ramai komentar
👉 Peluang laku lebih besar`
      },
      {
        id: 5,
        icon: "flame",
        emoji: "🔥",
        tag: "OPSIONAL",
        tagColor: "bg-orange-500/15 text-orange-300 border-orange-500/30",
        title: "Closing",
        subtitle: "Kirim link paket ads",
        content: `Kalau kakak mau, bisa langsung cek di sini ya 👇
🔗 https://syam-digital.myscalev.com/paket-ads

Atau chat admin:.`
      },
      {
        id: 6,
        icon: "phone",
        emoji: "📲",
        tag: "PENTING",
        tagColor: "bg-red-500/15 text-red-300 border-red-500/30",
        title: "Arah ke WhatsApp Grup",
        subtitle: "Ajak gabung grup WA",
        content: `Oh iya kak 😊

👉 Untuk info yang lebih cepat, bisa gabung juga ke grup WhatsApp:
🔗 https://chat.whatsapp.com/Fekb6aMbn4qGR8Xb2TKCOP`
      }
    ];

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, (m) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[m]));
    }

    function renderScripts() {
      const container = document.getElementById('scripts-container');
      container.innerHTML = scripts.map((s, i) => `
        <article class="script-card card-glow bg-white/5 backdrop-blur-sm border border-white/10 rounded-2xl overflow-hidden shadow-xl" style="animation: toastIn 0.5s ease-out ${i * 0.08}s backwards;">
          <div class="p-5 sm:p-6">
            <div class="flex items-start justify-between gap-3 mb-4">
              <div class="flex items-start gap-3 min-w-0 flex-1">
                <div class="flex-shrink-0 w-11 h-11 rounded-xl bg-gradient-to-br from-green-500/20 to-emerald-600/20 border border-green-500/30 flex items-center justify-center text-xl">
                  ${s.emoji}
                </div>
                <div class="min-w-0 flex-1">
                  <div class="flex flex-wrap items-center gap-2 mb-1">
                    <span class="text-xs font-bold text-red-400 tracking-wider">SCRIPT ${s.id}</span>
                    <span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold tracking-wider border ${s.tagColor}">
                      ${s.tag}
                    </span>
                  </div>
                  <h2 class="text-lg sm:text-xl font-bold text-white leading-tight">${escapeHtml(s.title)}</h2>
                  <p class="text-sm text-red-100/60 mt-0.5">${escapeHtml(s.subtitle)}</p>
                </div>
              </div>
              <button
                data-copy-id="${s.id}"
                class="copy-btn flex-shrink-0 inline-flex items-center gap-1.5 px-3 sm:px-4 py-2 rounded-lg bg-red-600 hover:bg-red-500 text-white text-sm font-semibold transition-colors shadow-lg shadow-red-600/30 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 focus:ring-offset-gray-900"
                aria-label="Salin script ${s.id}"
              >
                <i data-lucide="copy" class="w-4 h-4"></i>
                <span class="copy-label hidden sm:inline">Copy</span>
              </button>
            </div>
            <div class="bg-black/50 border border-red-900/30 rounded-xl p-4 sm:p-5">
              <pre class="script-mono text-red-50/90 whitespace-pre-wrap break-words">${escapeHtml(s.content)}</pre>
            </div>
          </div>
        </article>
      `).join('');

      // Attach copy handlers
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', handleCopy);
      });

      lucide.createIcons();
    }

    async function handleCopy(e) {
      const btn = e.currentTarget;
      const id = parseInt(btn.dataset.copyId);
      const script = scripts.find(s => s.id === id);
      if (!script) return;

      try {
        await navigator.clipboard.writeText(script.content);
        showCopySuccess(btn);
        showToast(`Script ${id} berhasil disalin! ✅`);
      } catch (err) {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = script.content;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          showCopySuccess(btn);
          showToast(`Script ${id} berhasil disalin! ✅`);
        } catch (e2) {
          showToast('Gagal menyalin. Coba pilih manual.', true);
        }
        document.body.removeChild(ta);
      }
    }

    function showCopySuccess(btn) {
      btn.classList.add('copy-btn-success');
      const icon = btn.querySelector('i');
      const label = btn.querySelector('.copy-label');
      icon.setAttribute('data-lucide', 'check');
      if (label) label.textContent = 'Tersalin';
      lucide.createIcons();
      setTimeout(() => {
        btn.classList.remove('copy-btn-success');
        const icn = btn.querySelector('i');
        icn.setAttribute('data-lucide', 'copy');
        const lbl = btn.querySelector('.copy-label');
        if (lbl) lbl.textContent = 'Copy';
        lucide.createIcons();
      }, 1800);
    }

    function showToast(message, isError = false) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast-enter pointer-events-auto mb-2 px-5 py-3 rounded-xl shadow-2xl border text-sm font-semibold ${
        isError
          ? 'bg-red-500 text-white border-red-400'
          : 'bg-gray-900 text-white border-green-500/40'
      }`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.remove('toast-enter');
        toast.classList.add('toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, 2200);
    }

    function applyConfig(config) {
      document.getElementById('app-title').textContent = config.app_title || defaultConfig.app_title;
      document.getElementById('app-subtitle').textContent = config.app_subtitle || defaultConfig.app_subtitle;
    }

    // Initialize
    renderScripts();

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          applyConfig(config);
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["app_title", config.app_title || defaultConfig.app_title],
          ["app_subtitle", config.app_subtitle || defaultConfig.app_subtitle]
        ])
      });
    }
  </script>

</html>
