 <body class="h-full">
  <div id="app" class="w-full h-full overflow-auto"></div>
  <script>
        const defaultConfig = {
            background_color: "#f0f4f8",
            surface_color: "#ffffff",
            text_color: "#2d3748",
            primary_action_color: "#4169E1",
            secondary_action_color: "#718096",
            font_family: "system-ui",
            font_size: 16,
            app_title: "Pencarian Data Penduduk",
            search_placeholder: "Cari berdasarkan nama, NIK, atau alamat...",
            login_title: "Login Admin",
            login_subtitle: "Masukkan password untuk mengakses data",
            footer_text: "© 2024 Data Penduduk"
        };

        let config = { ...defaultConfig };
        let allData = [];
        let filteredData = [];
        let currentFilters = {
            gender: '',
            ageRange: '',
            dusun: ''
        };
        let isAuthenticated = false;

        const CORRECT_PASSWORD = "7203192010";
        const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/1uY32OytNzfwY0KvOWfPxsSFLkTVFVLskb5E_nUwDqks/gviz/tq?tqx=out:csv&gid=1000014469';
        const KEPALA_KELUARGA_URL = 'https://docs.google.com/spreadsheets/d/1uY32OytNzfwY0KvOWfPxsSFLkTVFVLskb5E_nUwDqks/gviz/tq?tqx=out:csv&gid=0';

        async function fetchSpreadsheetData() {
            try {
                const response = await fetch(SPREADSHEET_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const csvText = await response.text();
                const parsedData = parseCSV(csvText);
                return parsedData;
            } catch (error) {
                console.error('Error fetching data:', error);
                showCopyNotification('Gagal memuat data dari Spreadsheet', true);
                return [];
            }
        }

        async function fetchKepalaKeluargaData() {
            try {
                const response = await fetch(KEPALA_KELUARGA_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const csvText = await response.text();
                return parseCSV(csvText);
            } catch (error) {
                console.error('Error fetching KK data:', error);
                return [];
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];
            
            const firstLine = lines[0];
            const separator = firstLine.includes('\t') ? '\t' : ',';
            
            const headerLine = firstLine.split(separator);
            const headers = headerLine.map(h => h.trim().replace(/^["']|["']$/g, ''));
            
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                let values = [];
                
                if (separator === ',') {
                    const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                    values = line.split(regex).map(v => v.trim().replace(/^["']|["']$/g, ''));
                } else {
                    values = line.split(separator).map(v => v.trim().replace(/^["']|["']$/g, ''));
                }
                
                if (values.length < Math.min(headers.length, 3)) continue;
                
                const row = {};
                let hasValidData = false;
                
                headers.forEach((header, index) => {
                    if (header && index < values.length) {
                        const value = values[index] || '';
                        row[header] = value;
                        if (value.trim()) hasValidData = true;
                    }
                });
                
                if (hasValidData && Object.keys(row).length > 0) {
                    data.push(row);
                }
            }
            
            return data;
        }

        function calculateAge(birthDate) {
            if (!birthDate || birthDate === '-') return '-';
            
            const birth = new Date(birthDate);
            const today = new Date();
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                age--;
            }
            
            return age;
        }

        function filterData(searchQuery) {
            let results = allData;

            if (searchQuery) {
                const query = searchQuery.toLowerCase().trim();
                results = results.filter(person => {
                    return Object.values(person).some(value => 
                        String(value).toLowerCase().trim() === query
                    );
                });
            }

            if (currentFilters.gender) {
                results = results.filter(person => {
                    const gender = String(person['Jenis Kelamin'] || '').toLowerCase();
                    return gender.includes(currentFilters.gender.toLowerCase());
                });
            }

            if (currentFilters.ageRange) {
                results = results.filter(person => {
                    const birthDate = person['tanggallahir'] || '';
                    const age = calculateAge(birthDate);
                    
                    if (age === '-' || age === 0) return false;
                    
                    switch(currentFilters.ageRange) {
                        case 'young': return age < 25;
                        case 'adult': return age >= 25 && age < 50;
                        case 'senior': return age >= 50;
                        default: return true;
                    }
                });
            }

            if (currentFilters.dusun) {
                results = results.filter(person => {
                    const dusun = String(person['dusun'] || '').toLowerCase();
                    return dusun.includes(currentFilters.dusun.toLowerCase());
                });
            }

            filteredData = results;
            renderResults();
        }

        function getUniqueDusun() {
            const dusuns = new Set();
            allData.forEach(person => {
                const dusun = person['dusun'] || '';
                if (dusun) dusuns.add(dusun);
            });
            return Array.from(dusuns).sort();
        }

        function renderResults() {
            const resultsContainer = document.getElementById('results-container');
            const resultsCount = document.getElementById('results-count');
            
            if (!resultsContainer || !resultsCount) return;
            
            const baseFontSize = config.font_size || defaultConfig.font_size;
            const customFont = config.font_family || defaultConfig.font_family;
            const baseFontStack = 'system-ui, -apple-system, sans-serif';

            resultsCount.textContent = `${filteredData.length} hasil ditemukan`;
            resultsCount.style.fontSize = `${baseFontSize * 0.9}px`;
            resultsCount.style.fontFamily = `${customFont}, ${baseFontStack}`;
            resultsCount.style.color = config.text_color || defaultConfig.text_color;

            if (filteredData.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="text-center py-16">
                        <div style="font-size: ${baseFontSize * 3}px;">🔍</div>
                        <p style="font-size: ${baseFontSize * 1.2}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.text_color}; margin-top: 16px;">Tidak ada data yang ditemukan</p>
                        <p style="font-size: ${baseFontSize * 0.9}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.secondary_action_color}; margin-top: 8px;">Coba gunakan kata kunci yang berbeda</p>
                    </div>
                `;
                return;
            }

            resultsContainer.innerHTML = filteredData.map((person, index) => {
                const name = person['nama'] || 'Tidak ada nama';
                const nik = person['nik'] || '-';
                const gender = person['Jenis Kelamin'] || '-';
                const birthDate = person['tanggallahir'] || '-';
                const religion = person['agama'] || '-';
                const address = person['alamat'] || '-';
                const dusun = person['dusun'] || '-';
                const age = calculateAge(birthDate);

                return `
                    <div class="result-card p-6 rounded-lg" style="background-color: ${config.surface_color}; margin-bottom: 16px; border: 1px solid #e2e8f0;">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;">
                            <h3 style="font-size: ${baseFontSize * 1.2}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.text_color}; font-weight: 600; margin: 0;">${name}</h3>
                            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                                ${nik !== '-' ? `
                                <div style="display: flex; align-items: center; gap: 4px; font-size: ${baseFontSize * 0.75}px; font-family: ${customFont}, ${baseFontStack}; background-color: ${config.primary_action_color}; color: white; padding: 4px 12px; border-radius: 12px;">
                                    <span>NIK: ${nik}</span>
                                    <button onclick="copyToClipboard('${nik}', 'NIK')" style="background: rgba(255, 255, 255, 0.3); border: none; color: white; cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: ${baseFontSize * 0.7}px; transition: all 0.2s ease;" onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.5)'" onmouseout="this.style.backgroundColor='rgba(255, 255, 255, 0.3)'">📋</button>
                                </div>
                                ` : ''}
                                ${person['no_kk'] && person['no_kk'] !== '-' ? `
                                <div style="display: flex; align-items: center; gap: 4px; font-size: ${baseFontSize * 0.75}px; font-family: ${customFont}, ${baseFontStack}; background-color: ${config.secondary_action_color}; color: white; padding: 4px 12px; border-radius: 12px;">
                                    <span>KK: ${person['no_kk']}</span>
                                    <button onclick="copyToClipboard('${person['no_kk']}', 'No KK')" style="background: rgba(255, 255, 255, 0.3); border: none; color: white; cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: ${baseFontSize * 0.7}px; transition: all 0.2s ease;" onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.5)'" onmouseout="this.style.backgroundColor='rgba(255, 255, 255, 0.3)'">📋</button>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 12px;">
                            <div>
                                <p style="font-size: ${baseFontSize * 0.8}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.secondary_action_color}; margin: 0;">Jenis Kelamin</p>
                                <p style="font-size: ${baseFontSize}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.text_color}; margin: 4px 0 0 0;">${gender}</p>
                            </div>
                            <div>
                                <p style="font-size: ${baseFontSize * 0.8}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.secondary_action_color}; margin: 0;">Tanggal Lahir</p>
                                <p style="font-size: ${baseFontSize}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.text_color}; margin: 4px 0 0 0;">${birthDate}</p>
                            </div>
                            <div>
                                <p style="font-size: ${baseFontSize * 0.8}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.secondary_action_color}; margin: 0;">Usia</p>
                                <p style="font-size: ${baseFontSize}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.text_color}; margin: 4px 0 0 0;">${age !== '-' ? `${age} tahun` : '-'}</p>
                            </div>
                            <div>
                                <p style="font-size: ${baseFontSize * 0.8}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.secondary_action_color}; margin: 0;">Agama</p>
                                <p style="font-size: ${baseFontSize}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.text_color}; margin: 4px 0 0 0;">${religion}</p>
                            </div>
                            <div>
                                <p style="font-size: ${baseFontSize * 0.8}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.secondary_action_color}; margin: 0;">Dusun</p>
                                <p style="font-size: ${baseFontSize}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.text_color}; margin: 4px 0 0 0;">${dusun}</p>
                            </div>
                            <div style="grid-column: 1 / -1;">
                                <p style="font-size: ${baseFontSize * 0.8}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.secondary_action_color}; margin: 0;">Alamat</p>
                                <p style="font-size: ${baseFontSize}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.text_color}; margin: 4px 0 0 0;">${address}</p>
                            </div>
                        </div>
                        ${Object.keys(person).length > 5 ? `
                            <button onclick="toggleDetails(${index})" style="margin-top: 12px; font-size: ${baseFontSize * 0.9}px; font-family: ${customFont}, ${baseFontStack}; color: white; background: ${config.primary_action_color}; border: none; cursor: pointer; padding: 10px 20px; border-radius: 8px; font-weight: 600; transition: all 0.2s ease;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
                                📋 Lihat Detail Lengkap
                            </button>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function toggleDetails(index) {
            const person = filteredData[index];
            if (!person) return;

            const baseFontSize = config.font_size || defaultConfig.font_size;
            const customFont = config.font_family || defaultConfig.font_family;
            const baseFontStack = 'system-ui, -apple-system, sans-serif';

            const name = person['nama'] || 'Detail Lengkap';

            const modalBackdrop = document.createElement('div');
            modalBackdrop.id = 'modal-backdrop';
            modalBackdrop.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0, 0, 0, 0.6);
                z-index: 9998;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                opacity: 0;
                transition: opacity 0.3s ease;
            `;

            const modalContent = document.createElement('div');
            modalContent.style.cssText = `
                background-color: ${config.surface_color};
                border-radius: 16px;
                max-width: 700px;
                width: 100%;
                max-height: 85%;
                overflow: hidden;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                transform: translateY(30px);
                transition: transform 0.3s ease;
                display: flex;
                flex-direction: column;
            `;

            const modalHeader = document.createElement('div');
            modalHeader.style.cssText = `
                background: linear-gradient(135deg, ${config.primary_action_color} 0%, #1e40af 100%);
                padding: 24px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            `;

            const headerLeft = document.createElement('div');
            headerLeft.style.cssText = `
                display: flex;
                align-items: center;
                gap: 16px;
                flex: 1;
            `;

            const adminPhoto = document.createElement('img');
            adminPhoto.src = 'https://res.cloudinary.com/di8stbg60/image/upload/v1767107507/SYAM_DIGITAL_ADMIN_dt6quc.jpg';
            adminPhoto.alt = 'Syam Digital Admin';
            adminPhoto.style.cssText = `
                width: 60px;
                height: 60px;
                border-radius: 50%;
                object-fit: cover;
                border: 3px solid rgba(255, 255, 255, 0.3);
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            `;
            adminPhoto.onerror = function() {
                this.style.display = 'none';
            };

            const titleContainer = document.createElement('div');
            titleContainer.style.cssText = `
                flex: 1;
            `;

            const modalTitle = document.createElement('h2');
            modalTitle.textContent = name;
            modalTitle.style.cssText = `
                font-size: ${baseFontSize * 1.5}px;
                font-family: ${customFont}, ${baseFontStack};
                color: white;
                margin: 0;
                font-weight: 700;
            `;

            const adminLabel = document.createElement('p');
            adminLabel.textContent = 'Admin: Syam Digital';
            adminLabel.style.cssText = `
                font-size: ${baseFontSize * 0.85}px;
                font-family: ${customFont}, ${baseFontStack};
                color: rgba(255, 255, 255, 0.9);
                margin: 4px 0 0 0;
                font-weight: 500;
            `;

            titleContainer.appendChild(modalTitle);
            titleContainer.appendChild(adminLabel);
            headerLeft.appendChild(adminPhoto);
            headerLeft.appendChild(titleContainer);

            const closeButton = document.createElement('button');
            closeButton.innerHTML = '×';
            closeButton.style.cssText = `
                background: rgba(255, 255, 255, 0.2);
                border: none;
                color: white;
                font-size: ${baseFontSize * 2}px;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s ease;
                padding: 0;
                line-height: 1;
            `;
            closeButton.onmouseover = function() {
                this.style.backgroundColor = 'rgba(255, 255, 255, 0.3)';
                this.style.transform = 'rotate(90deg)';
            };
            closeButton.onmouseout = function() {
                this.style.backgroundColor = 'rgba(255, 255, 255, 0.2)';
                this.style.transform = 'rotate(0deg)';
            };

            modalHeader.appendChild(headerLeft);
            modalHeader.appendChild(closeButton);

            const modalBody = document.createElement('div');
            modalBody.style.cssText = `
                padding: 24px;
                overflow-y: auto;
                flex: 1;
            `;

            const detailsHTML = Object.entries(person).map(([key, value]) => {
                const displayValue = value || '-';
                const isCopyable = (key.toLowerCase() === 'nik' || key.toLowerCase() === 'no_kk' || key.toLowerCase().includes('no kk')) && displayValue !== '-';
                
                return `
                    <div style="padding: 16px; border-bottom: 1px solid #e2e8f0; transition: background-color 0.2s ease;" onmouseover="this.style.backgroundColor='${config.background_color}'" onmouseout="this.style.backgroundColor='transparent'">
                        <p style="font-size: ${baseFontSize * 0.8}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.secondary_action_color}; margin: 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">${key}</p>
                        <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
                            <p style="font-size: ${baseFontSize * 1.05}px; font-family: ${customFont}, ${baseFontStack}; color: ${config.text_color}; margin: 0; word-break: break-word; flex: 1;">${displayValue}</p>
                            ${isCopyable ? `
                                <button onclick="copyToClipboard('${displayValue}', '${key}')" style="background-color: ${config.primary_action_color}; border: none; color: white; cursor: pointer; padding: 6px 12px; border-radius: 6px; font-size: ${baseFontSize * 0.8}px; font-family: ${customFont}, ${baseFontStack}; transition: all 0.2s ease; flex-shrink: 0;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">📋 Salin</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            modalBody.innerHTML = detailsHTML;

            modalContent.appendChild(modalHeader);
            modalContent.appendChild(modalBody);
            modalBackdrop.appendChild(modalContent);
            document.body.appendChild(modalBackdrop);

            setTimeout(() => {
                modalBackdrop.style.opacity = '1';
                modalContent.style.transform = 'translateY(0)';
            }, 10);

            const closeModal = () => {
                modalBackdrop.style.opacity = '0';
                modalContent.style.transform = 'translateY(30px)';
                setTimeout(() => {
                    if (modalBackdrop.parentNode) {
                        document.body.removeChild(modalBackdrop);
                    }
                }, 300);
            };

            closeButton.addEventListener('click', closeModal);
            modalBackdrop.addEventListener('click', (e) => {
                if (e.target === modalBackdrop) {
                    closeModal();
                }
            });

            const escapeHandler = (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                    document.removeEventListener('keydown', escapeHandler);
                }
            };
            document.addEventListener('keydown', escapeHandler);
        }

        function renderFilterBadges() {
            const container = document.getElementById('active-filters');
            if (!container) return;
            
            const baseFontSize = config.font_size || defaultConfig.font_size;
            const customFont = config.font_family || defaultConfig.font_family;
            const baseFontStack = 'system-ui, -apple-system, sans-serif';
            
            const badges = [];
            
            if (currentFilters.gender) {
                badges.push(`
                    <span class="filter-badge" style="display: inline-flex; align-items: center; gap: 6px; font-size: ${baseFontSize * 0.85}px; font-family: ${customFont}, ${baseFontStack}; background-color: ${config.primary_action_color}; color: white; padding: 6px 12px; border-radius: 16px; margin-right: 8px; margin-bottom: 8px;">
                        ${currentFilters.gender === 'laki' ? 'Laki-laki' : 'Perempuan'}
                        <button onclick="removeFilter('gender')" style="background: none; border: none; color: white; cursor: pointer; padding: 0; margin-left: 4px; font-size: ${baseFontSize * 1.2}px; line-height: 1;">×</button>
                    </span>
                `);
            }
            
            if (currentFilters.ageRange) {
                const ageLabels = {
                    'young': 'Di bawah 25 tahun',
                    'adult': '25-50 tahun',
                    'senior': 'Di atas 50 tahun'
                };
                badges.push(`
                    <span class="filter-badge" style="display: inline-flex; align-items: center; gap: 6px; font-size: ${baseFontSize * 0.85}px; font-family: ${customFont}, ${baseFontStack}; background-color: ${config.primary_action_color}; color: white; padding: 6px 12px; border-radius: 16px; margin-right: 8px; margin-bottom: 8px;">
                        ${ageLabels[currentFilters.ageRange]}
                        <button onclick="removeFilter('ageRange')" style="background: none; border: none; color: white; cursor: pointer; padding: 0; margin-left: 4px; font-size: ${baseFontSize * 1.2}px; line-height: 1;">×</button>
                    </span>
                `);
            }
            
            if (currentFilters.dusun) {
                badges.push(`
                    <span class="filter-badge" style="display: inline-flex; align-items: center; gap: 6px; font-size: ${baseFontSize * 0.85}px; font-family: ${customFont}, ${baseFontStack}; background-color: ${config.primary_action_color}; color: white; padding: 6px 12px; border-radius: 16px; margin-right: 8px; margin-bottom: 8px;">
                        ${currentFilters.dusun}
                        <button onclick="removeFilter('dusun')" style="background: none; border: none; color: white; cursor: pointer; padding: 0; margin-left: 4px; font-size: ${baseFontSize * 1.2}px; line-height: 1;">×</button>
                    </span>
                `);
            }

        function copyToClipboard(text, label) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showCopyNotification(`${label} berhasil disalin!`);
                }).catch(() => {
                    fallbackCopy(text, label);
                });
            } else {
                fallbackCopy(text, label);
            }
        }

        function fallbackCopy(text, label) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showCopyNotification(`${label} berhasil disalin!`);
            } catch (err) {
                showCopyNotification(`Gagal menyalin ${label}`, true);
            }
            document.body.removeChild(textArea);
        }
