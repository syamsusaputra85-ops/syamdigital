<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML to GIF Converter</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }
    
    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }
    
    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }
    
    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    .card h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 1.3em;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }
    
    textarea {
      width: 100%;
      min-height: 300px;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      resize: vertical;
      transition: border-color 0.3s;
    }
    
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    #preview {
      width: 100%;
      min-height: 300px;
      background: #f5f5f5;
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 15px;
      overflow: auto;
      font-size: 14px;
    }
    
    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .setting-group {
      display: flex;
      flex-direction: column;
    }
    
    .setting-group label {
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.9em;
    }
    
    .setting-group input {
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    .setting-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 2px solid #e0e0e0;
    }
    
    .btn-secondary:hover {
      background: #e8e8e8;
    }
    
    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      width: 100%;
    }
    
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
    }
    
    .btn-success:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .status {
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      display: none;
      font-weight: 600;
    }
    
    .status.show {
      display: block;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .info-box {
      background: #e3f2fd;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 6px;
      margin-top: 15px;
      font-size: 0.95em;
      color: #1565c0;
      line-height: 1.6;
    }
    
    .info-box strong {
      display: block;
      margin-bottom: 8px;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>

 </head>
 <body>
  <div class="container">
   <div class="header">
    <h1>🎬 HTML to GIF Converter</h1>
    <p>Ubah HTML menjadi animasi GIF dengan mudah</p>
   </div>
   <div class="main-content"><!-- Editor Panel -->
    <div class="card">
     <h2>HTML Input</h2><textarea id="htmlInput" placeholder="Paste kode HTML Anda di sini..."></textarea>
    </div><!-- Preview Panel -->
    <div class="card">
     <h2>Preview</h2>
     <div id="preview"></div>
    </div>
   </div><!-- Settings Panel -->
   <div class="card">
    <h2>⚙️ Pengaturan</h2>
    <div class="settings">
     <div class="setting-group"><label for="width">Lebar (px)</label> <input type="number" id="width" value="400" min="100" max="1200">
     </div>
     <div class="setting-group"><label for="height">Tinggi (px)</label> <input type="number" id="height" value="300" min="100" max="1200">
     </div>
     <div class="setting-group"><label for="frames">Jumlah Frame</label> <input type="number" id="frames" value="12" min="3" max="30">
     </div>
     <div class="setting-group"><label for="frameDuration">Durasi Frame (ms)</label> <input type="number" id="frameDuration" value="150" min="50" max="500">
     </div>
    </div>
    <div id="status" class="status"></div>
    <div class="button-group"><button class="btn-secondary" onclick="updatePreview()">👁️ Refresh Preview</button> <button class="btn-primary" onclick="downloadHTML()">📥 Download HTML</button>
    </div><button class="btn-success" id="convertBtn" onclick="convertToHtmlAnimation()"> 🎬 Buat Animasi HTML </button>
    <div class="info-box"><strong>💡 Info:</strong> Converter ini menghasilkan HTML animasi yang bisa dibuka di browser manapun. Hasil lebih baik untuk HTML dengan CSS sederhana.
    </div>
   </div>
  </div>
  <script>
    const htmlInput = document.getElementById('htmlInput');
    const preview = document.getElementById('preview');
    const statusEl = document.getElementById('status');
    const convertBtn = document.getElementById('convertBtn');
    
    // Sample HTML
    const sampleHTML = `<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: Arial, sans-serif;">
  <div style="text-align: center; color: white;">
    <h1 style="font-size: 3em; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">🎬</h1>
    <h2 style="margin: 20px 0 0 0; font-size: 2em;">HTML Animasi</h2>
    <p style="font-size: 1.2em; opacity: 0.9;">Ubah HTML jadi animasi</p>
  </div>
</div>`;
    
    htmlInput.value = sampleHTML;
    
    function showStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = `status show ${type}`;
      setTimeout(() => {
        statusEl.classList.remove('show');
      }, 5000);
    }
    
    function updatePreview() {
      try {
        preview.innerHTML = htmlInput.value;
      } catch (e) {
        showStatus('❌ Error: HTML tidak valid', 'error');
      }
    }
    
    function downloadHTML() {
      const link = document.createElement('a');
      link.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(htmlInput.value);
      link.download = 'converted.html';
      link.click();
      showStatus('✅ HTML berhasil diunduh', 'success');
    }
    
    async function convertToHtmlAnimation() {
      try {
        if (!htmlInput.value.trim()) {
          showStatus('❌ Silakan masukkan HTML terlebih dahulu', 'error');
          return;
        }
        
        convertBtn.disabled = true;
        convertBtn.innerHTML = '<span class="loading-spinner"></span>Processing...';
        showStatus('⏳ Sedang membuat animasi HTML...', 'info');
        
        const width = parseInt(document.getElementById('width').value);
        const height = parseInt(document.getElementById('height').value);
        const frameCount = parseInt(document.getElementById('frames').value);
        const frameDuration = parseInt(document.getElementById('frameDuration').value);
        
        // Create frames using canvas
        const frames = [];
        
        for (let i = 0; i < frameCount; i++) {
          const container = document.createElement('div');
          container.style.width = width + 'px';
          container.style.height = height + 'px';
          container.style.position = 'absolute';
          container.style.left = '-9999px';
          container.style.opacity = 0.5 + (Math.sin(i / frameCount * Math.PI * 2) * 0.5);
          container.innerHTML = htmlInput.value;
          document.body.appendChild(container);
          
          await new Promise(resolve => setTimeout(resolve, 100));
          
          try {
            const canvas = await html2canvas(container, {
              backgroundColor: null,
              scale: 1,
              logging: false,
              useCORS: true,
              allowTaint: true
            });
            
            frames.push(canvas.toDataURL('image/png'));
          } catch (e) {
            console.error('Canvas error:', e);
          }
          
          document.body.removeChild(container);
          showStatus(`⏳ Rendering frame ${i + 1}/${frameCount}...`, 'info');
        }
        
        // Create HTML with embedded frames
        const animationDuration = (frameCount * frameDuration) / 1000;
        let htmlOutput = `<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f0f0; }
    .frame-container {
      width: ${width}px;
      height: ${height}px;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: fade ${animationDuration}s infinite linear;
    }
`;
        
        frames.forEach((frameData, index) => {
          const delay = (index * frameDuration) / 1000;
          htmlOutput += `    .frame:nth-child(${index + 1}) { 
      animation-delay: -${delay}s;
      background-image: url('${frameData}');
    }
`;
        });
        
        htmlOutput += `    @keyframes fade {
      0% { opacity: 1; }
      ${(1 / frameCount) * 100}% { opacity: 1; }
      ${((1 / frameCount) * 100) + 0.1}% { opacity: 0; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="frame-container">
`;
        
        for (let i = 0; i < frameCount; i++) {
          htmlOutput += `    <div class="frame"></div>\n`;
        }
        
        htmlOutput += `  </div>
</body>
</html>`;
        
        // Download file
        const link = document.createElement('a');
        link.href = 'data:text/html;charset=utf-8,' + encodeURIComponent(htmlOutput);
        link.download = 'animated-output.html';
        link.click();
        
        convertBtn.disabled = false;
        convertBtn.textContent = '🎬 Buat Animasi HTML';
        showStatus('✅ Animasi HTML berhasil dibuat dan diunduh!', 'success');
        
      } catch (e) {
        convertBtn.disabled = false;
        convertBtn.textContent = '🎬 Buat Animasi HTML';
        showStatus('❌ Error: ' + e.message, 'error');
        console.error(e);
      }
    }
    
    updatePreview();
  </script>
