  <script>
    const defaultConfig = {
      phone_number: '628123456789',
      website_link: 'https://website-anda.com',
      custom_message: ''
    };

    let config = { ...defaultConfig };
    let messageType = 'link'; // 'link' or 'plain'

    const phoneInput = document.getElementById('phone');
    const websiteInput = document.getElementById('website');
    const customMessageInput = document.getElementById('custom-message');
    const generatedLinkInput = document.getElementById('generated-link');
    const messagePreviewLink = document.getElementById('message-preview-link');
    const messagePreviewPlain = document.getElementById('message-preview-plain');
    const copyBtn = document.getElementById('copy-btn');
    const copyText = document.getElementById('copy-text');
    const openWaBtn = document.getElementById('open-wa-btn');
    const toast = document.getElementById('toast');

    // Tab elements
    const tabLink = document.getElementById('tab-link');
    const tabPlain = document.getElementById('tab-plain');
    const sectionLink = document.getElementById('section-link');
    const sectionPlain = document.getElementById('section-plain');
    const fieldWebsite = document.getElementById('field-website');
    const fieldCustom = document.getElementById('field-custom');

    function getMessage(websiteLink) {
      return `Halo! Kami sudah menerima chat Anda. Sambil menunggu admin kembali, silakan cek katalog produk di ${websiteLink}!`;
    }

    function generateWhatsAppLink(phone, message) {
      const encodedMessage = encodeURIComponent(message);
      return `https://wa.me/${phone}?text=${encodedMessage}`;
    }

    function switchTab(type) {
      messageType = type;
      
      // Update tab buttons
      if (type === 'link') {
        tabLink.classList.add('bg-gradient-to-r', 'from-green-400', 'to-emerald-500', 'text-white');
        tabLink.classList.remove('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
        
        tabPlain.classList.remove('bg-gradient-to-r', 'from-green-400', 'to-emerald-500', 'text-white');
        tabPlain.classList.add('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
        
        sectionLink.classList.remove('hidden');
        sectionPlain.classList.add('hidden');
        fieldWebsite.classList.remove('hidden');
        fieldCustom.classList.add('hidden');
      } else {
        tabPlain.classList.add('bg-gradient-to-r', 'from-green-400', 'to-emerald-500', 'text-white');
        tabPlain.classList.remove('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
        
        tabLink.classList.remove('bg-gradient-to-r', 'from-green-400', 'to-emerald-500', 'text-white');
        tabLink.classList.add('bg-gray-200', 'text-gray-700', 'hover:bg-gray-300');
        
        sectionPlain.classList.remove('hidden');
        sectionLink.classList.add('hidden');
        fieldWebsite.classList.add('hidden');
        fieldCustom.classList.remove('hidden');
      }
      
      updateUI();
    }

    function updateUI() {
      const phone = phoneInput.value || config.phone_number || defaultConfig.phone_number;
      
      if (messageType === 'link') {
        const website = websiteInput.value || config.website_link || defaultConfig.website_link;
        const message = getMessage(website);
        messagePreviewLink.textContent = message;
        generatedLinkInput.value = generateWhatsAppLink(phone, message);
      } else {
        const message = customMessageInput.value || config.custom_message || '';
        messagePreviewPlain.textContent = message || '(Pesan belum diisi)';
        generatedLinkInput.value = message ? generateWhatsAppLink(phone, message) : '';
      }
    }

    function showToast() {
      toast.style.opacity = '1';
      toast.style.pointerEvents = 'auto';
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.pointerEvents = 'none';
      }, 2000);
    }

    async function copyToClipboard() {
      const link = generatedLinkInput.value;
      if (!link) {
        toast.textContent = '⚠️ Link belum siap, isi pesan terlebih dahulu';
        showToast();
        return;
      }
      
      try {
        await navigator.clipboard.writeText(link);
        copyText.textContent = 'Tersalin!';
        showToast();
        setTimeout(() => {
          copyText.textContent = 'Salin';
        }, 2000);
      } catch (err) {
        generatedLinkInput.select();
        document.execCommand('copy');
        copyText.textContent = 'Tersalin!';
        showToast();
        setTimeout(() => {
          copyText.textContent = 'Salin';
        }, 2000);
      }
    }

    function openWhatsApp() {
      const link = generatedLinkInput.value;
      if (!link) {
        toast.textContent = '⚠️ Link belum siap, isi pesan terlebih dahulu';
        showToast();
        return;
      }
      window.open(link, '_blank', 'noopener,noreferrer');
    }

    // Event Listeners
    tabLink.addEventListener('click', () => switchTab('link'));
    tabPlain.addEventListener('click', () => switchTab('plain'));

    phoneInput.addEventListener('input', () => {
      updateUI();
      if (window.elementSdk) {
        window.elementSdk.setConfig({ phone_number: phoneInput.value });
      }
    });

    websiteInput.addEventListener('input', () => {
      updateUI();
      if (window.elementSdk) {
        window.elementSdk.setConfig({ website_link: websiteInput.value });
      }
    });

    customMessageInput.addEventListener('input', () => {
      updateUI();
      if (window.elementSdk) {
        window.elementSdk.setConfig({ custom_message: customMessageInput.value });
      }
    });

    copyBtn.addEventListener('click', copyToClipboard);
    openWaBtn.addEventListener('click', openWhatsApp);

    // Element SDK Integration
    async function onConfigChange(newConfig) {
      config = { ...defaultConfig, ...newConfig };
      
      if (config.phone_number && !phoneInput.value) {
        phoneInput.value = config.phone_number;
      }
      if (config.website_link && !websiteInput.value) {
        websiteInput.value = config.website_link;
      }
      if (config.custom_message && !customMessageInput.value) {
        customMessageInput.value = config.custom_message;
      }
      
      updateUI();
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['phone_number', config.phone_number || defaultConfig.phone_number],
        ['website_link', config.website_link || defaultConfig.website_link],
        ['custom_message', config.custom_message || defaultConfig.custom_message]
      ]);
    }

    // Initialize
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    // Set initial values
    phoneInput.value = defaultConfig.phone_number;
    websiteInput.value = defaultConfig.website_link;
    updateUI();
  </script>
