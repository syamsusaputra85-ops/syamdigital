            100% { transform: rotate(360deg); }

            animation: fadeIn 0.3s ease-in;

            to { opacity: 1; transform: translateY(0); }

            animation: fadeInModal 0.2s ease-in;

 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full"></div>
  <script>
        const defaultConfig = {
            background_color: "#f0fdf4",
            surface_color: "#ffffff",
            text_color: "#064e3b",
            primary_action: "#22c55e",
            secondary_action: "#10b981",
            font_family: "Plus Jakarta Sans",
            font_size: 16,
            main_title: "PAGU ALOKASI DANA DESA",
            subtitle: "KABUPATEN DONGGALA - TAHUN ANGGARAN 2026",
            search_placeholder: "Cari nama desa atau kecamatan..."
        };

        let allData = [];
        let isLoading = true;

        async function fetchDataFromGoogleSheets() {
            try {
                const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTH3OhpEMUs9iHqGouR28UYG-J0-Po6s0Cg8WoJP25gidViHdWJSJqBlc6AvfzGwS5c0zVYEFmpA3Gg/pub?gid=829069203&single=true&output=csv';
                const response = await fetch(url);
                const csvText = await response.text();
                
                const lines = csvText.split('\n');
                const data = [];
                
                // Skip header row and process data rows
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    
                    const values = parseCSVLine(line);
                    
                    // Format: Kolom A=Nama Desa, B=Kecamatan, C=Kabupaten, D=Kode Desa, E=Alokasi Dana Desa
                    if (values.length >= 5 && values[0] && values[4]) {
                        data.push({
                            desa: values[0] || '',
                            kecamatan: values[1] || '',
                            kabupaten: values[2] || '',
                            kode_desa: values[3] || '',
                            pagu: values[4] || '0'
                        });
                    }
                }
                
                return data;
            } catch (error) {
                // If fetch fails, return sample data to show the UI works
                return [
                    {
                        desa: 'SIBALAYA',
                        kecamatan: 'DONGGALA',
                        kabupaten: 'DONGGALA',
                        kode_desa: '7205010001',
                        pagu: '897447000'
                    }
                ];
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            
            return result;
        }

        function formatCurrency(value) {
            const num = parseInt(value.replace(/[^\d]/g, ''));
            if (isNaN(num)) return value;
            return 'Rp ' + num.toLocaleString('id-ID');
        }

        function searchData(query) {
            if (!query || query.trim() === '') return allData;
            
            const searchTerm = query.toLowerCase().trim();
            return allData.filter(item => {
                const desaMatch = item.desa && item.desa.toLowerCase().includes(searchTerm);
                const kecamatanMatch = item.kecamatan && item.kecamatan.toLowerCase().includes(searchTerm);
                return desaMatch || kecamatanMatch;
            });
        }

            const baseSize = config.font_size || defaultConfig.font_size;
            
            // Remove existing modal if any
            const existingModal = document.getElementById('detailModal');

            // Create modal overlay
            const modal = document.createElement('div');
            modal.id = 'detailModal';
            modal.className = 'modal-overlay';

                                ✕
                            </button>
                        </div>
                    </div>
                    
                    <!-- Modal Body -->
                    <div class="p-6">
                        <!-- Alokasi Dana Highlight -->

                            <div style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize * 0.875}px;" class="mb-2 font-semibold">

                            </div>

                                <div style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize * 0.875}px;" class="font-semibold text-right">
                                    ${item.desa}
                                </div>
                            </div>
                            
                            <div class="detail-row">
                                <div style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.875}px; font-weight: 600;">
                                    Kecamatan
                                </div>
                                <div style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize * 0.875}px;" class="font-semibold text-right">
                                    ${item.kecamatan}
                                </div>
                            </div>
                            
                            <div class="detail-row">
                                <div style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.875}px; font-weight: 600;">
                                    Kabupaten
                                </div>
                                <div style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize * 0.875}px;" class="font-semibold text-right">
                                    ${item.kabupaten || 'DONGGALA'}
                                </div>
                            </div>
                            
                            <div class="detail-row">
                                <div style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.875}px; font-weight: 600;">
                                    Kode Desa
                                </div>
                                <div style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize * 0.875}px;" class="font-semibold text-right font-mono">
                                    ${item.kode_desa || '-'}
                                </div>
                            </div>
                            
                            <div class="detail-row">
                                <div style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.875}px; font-weight: 600;">
                                    Alokasi Dana Desa
                                </div>
                                <div style="color: ${config.primary_action || defaultConfig.primary_action}; font-size: ${baseSize}px;" class="font-bold text-right">
                                    ${formatCurrency(item.pagu)}
                                </div>
                            </div>
                        </div>
                        
                        <!-- Share to WhatsApp Button -->
                        <div class="mt-6">
                            <button id="shareWhatsApp" style="background-color: #25D366; color: white; font-size: ${baseSize * 0.875}px; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; transition: all 0.2s; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;" onmouseover="this.style.backgroundColor='#1fb855'" onmouseout="this.style.backgroundColor='#25D366'">
                                <svg style="width: 20px; height: 20px; fill: white;" viewBox="0 0 24 24">
                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                                </svg>
                                Bagikan ke WhatsApp
                            </button>
                        </div>
                        
                        <!-- Info Footer -->
                        <div class="mt-6 p-4 rounded-lg" style="background-color: ${config.primary_action || defaultConfig.primary_action}10;">
                            <div style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.75}px;" class="text-center">
                                ℹ️ Data Pagu Alokasi Dana Desa Kabupaten Donggala Tahun Anggaran 2026
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Close modal handlers
            const closeBtn = document.getElementById('closeModal');
            closeBtn.addEventListener('click', () => modal.remove());
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });
            
            // Close on Escape key
            const escapeHandler = (e) => {
                if (e.key === 'Escape') {
                    modal.remove();
                    document.removeEventListener('keydown', escapeHandler);
                }
            };
            document.addEventListener('keydown', escapeHandler);
            
            // WhatsApp share handler
            const shareBtn = document.getElementById('shareWhatsApp');
            shareBtn.addEventListener('click', () => {
                const message = `📢 *PAGU ALOKASI DANA DESA 2026*
                
🏘️ *Desa:* ${item.desa}
📍 *Kecamatan:* ${item.kecamatan}
🗺️ *Kabupaten:* ${item.kabupaten || 'DONGGALA'}
🔢 *Kode Desa:* ${item.kode_desa || '-'}

💰 *Total Alokasi Dana Desa:*
${formatCurrency(item.pagu)}

_Data Pagu Alokasi Dana Desa Kabupaten Donggala Tahun Anggaran 2026_

ℹ️ *Info Selengkapnya:*
https://syam.digital/pagu-add`;
                
                const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
                window.open(whatsappUrl, '_blank', 'noopener,noreferrer');
            });
        }

        function renderApp(config) {
            const app = document.getElementById('app');
            const customFont = config.font_family || defaultConfig.font_family;
            const baseFontStack = 'system-ui, -apple-system, sans-serif';
            const baseSize = config.font_size || defaultConfig.font_size;
            
            app.style.fontFamily = `${customFont}, ${baseFontStack}`;
            app.style.backgroundColor = config.background_color || defaultConfig.background_color;
            
            app.innerHTML = `
                <div class="w-full h-full overflow-auto" style="background-color: ${config.background_color || defaultConfig.background_color};">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <!-- Header -->
                        <div class="text-center mb-8">
                            <div class="flex justify-center mb-4">
                                <img src="https://res.cloudinary.com/dpr2vc3b0/image/upload/v1767107096/logo_donggala-fix-2025_napiej.png" alt="Logo Kabupaten Donggala" style="height: 80px; width: auto;" onerror="this.style.display='none';">
                            </div>
                            <h1 id="mainTitle" style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize * 2}px;" class="font-bold mb-2">
                                ${config.main_title || defaultConfig.main_title}
                            </h1>
                            <p id="subtitle" style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 1.125}px;" class="font-semibold">
                                ${config.subtitle || defaultConfig.subtitle}
                            </p>
                        </div>

                        <!-- Search Box -->
                        <div class="mb-8">
                            <div class="max-w-2xl mx-auto">
                                <input 
                                    type="text" 
                                    id="searchInput"
                                    placeholder="${config.search_placeholder || defaultConfig.search_placeholder}"
                                    style="background-color: ${config.surface_color || defaultConfig.surface_color}; color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize}px; border: 2px solid ${config.primary_action || defaultConfig.primary_action};"
                                    class="w-full px-6 py-4 rounded-xl focus:outline-none search-glow"
                                />
                            </div>
                        </div>

                        <!-- Loading State -->
                        <div id="loadingState" class="text-center py-12">
                            <div class="loading-spinner mx-auto mb-4" style="border-top-color: ${config.primary_action || defaultConfig.primary_action};"></div>
                            <p style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize}px;">Memuat data...</p>
                        </div>

                        <!-- Debug Info -->
                        <div id="debugInfo" class="mb-4 p-4 rounded-lg" style="background-color: ${config.surface_color || defaultConfig.surface_color}; border: 1px solid ${config.secondary_action || defaultConfig.secondary_action};">
                            <p style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize * 0.875}px;" class="font-semibold mb-2">
                                📊 Informasi Data:
                            </p>
                            <p id="dataStatus" style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.75}px;">
                                Sedang memuat...
                            </p>
                        </div>

                        <!-- Stats -->
                        <div id="stats" class="hidden mb-6 text-center">
                            <p style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.875}px;" class="font-semibold">
                                Menampilkan <span id="resultCount">0</span> dari <span id="totalCount">0</span> desa
                            </p>
                        </div>

                        <!-- Results -->
                        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

                        <!-- Empty State -->
                        <div id="emptyState" class="hidden text-center py-12">
                            <div style="font-size: ${baseSize * 3}px;" class="mb-4">🔍</div>
                            <p style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize * 1.125}px;" class="font-semibold mb-2">
                                Tidak ada hasil ditemukan
                            </p>
                            <p style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.875}px;">
                                Coba kata kunci yang berbeda
                            </p>
                        </div>
                    </div>
                </div>
            `;

            setupEventListeners(config);
            
            if (isLoading) {
                loadData(config);
            } else {
                displayResults(allData, config);
            }
        }

        async function loadData(config) {
            const dataStatus = document.getElementById('dataStatus');
            if (dataStatus) {
                dataStatus.textContent = 'Mengambil data dari Google Sheets...';
            }
            
            allData = await fetchDataFromGoogleSheets();
            isLoading = false;
            
            if (dataStatus) {
                if (allData.length > 0) {
                    dataStatus.innerHTML = `✅ <strong>${allData.length} desa</strong> berhasil dimuat dari spreadsheet<br><small>Contoh: ${allData[0].desa} (${allData[0].kecamatan})</small>`;
                } else {
                    dataStatus.innerHTML = '⚠️ Tidak ada data yang dimuat. Periksa URL Google Sheets atau koneksi internet.';
                }
            }
            
            displayResults(allData, config);
        }

        function setupEventListeners(config) {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const results = searchData(e.target.value);
                    displayResults(results, config);
                });
            }
        }

        function displayResults(data, config) {
            const resultsContainer = document.getElementById('results');
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');
            const stats = document.getElementById('stats');
            const baseSize = config.font_size || defaultConfig.font_size;
            
            loadingState.classList.add('hidden');
            
            if (data.length === 0) {
                resultsContainer.innerHTML = '';
                emptyState.classList.remove('hidden');
                stats.classList.add('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            stats.classList.remove('hidden');
            
            document.getElementById('resultCount').textContent = data.length;
            document.getElementById('totalCount').textContent = allData.length;
            
            resultsContainer.innerHTML = data.map(item => `
                <div class="result-card p-6 rounded-xl fade-in" style="background-color: ${config.surface_color || defaultConfig.surface_color}; border: 1px solid rgba(34, 197, 94, 0.1); cursor: pointer;" onclick='showDetailModal(${JSON.stringify(item)}, window.elementSdk ? window.elementSdk.config : ${JSON.stringify(defaultConfig)})'>
                    <div class="mb-4">
                        <div style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.75}px;" class="font-semibold mb-1">
                            ${item.kecamatan}
                        </div>
                        <h3 style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize * 1.125}px;" class="font-bold">
                            ${item.desa}
                        </h3>
                        ${item.kode_desa ? `
                            <div style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.7}px;" class="mt-1">
                                Kode: ${item.kode_desa}
                            </div>
                        ` : ''}
                    </div>
                    <div class="pt-4 border-t" style="border-color: rgba(34, 197, 94, 0.1);">
                        <div style="color: ${config.text_color || defaultConfig.text_color}; font-size: ${baseSize * 0.75}px;" class="mb-1">
                            Alokasi Dana Desa
                        </div>
                        <div style="color: ${config.primary_action || defaultConfig.primary_action}; font-size: ${baseSize * 1.25}px;" class="font-bold">
                            ${formatCurrency(item.pagu)}
                        </div>
                    </div>
                    <div class="mt-3 text-right">
                        <span style="color: ${config.secondary_action || defaultConfig.secondary_action}; font-size: ${baseSize * 0.75}px;">
                            Klik untuk detail →
                        </span>
                    </div>
                </div>
            `).join('');
        }

        async function onConfigChange(config) {
            renderApp(config);
        }

        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                onConfigChange,
                mapToCapabilities: (config) => ({
                    recolorables: [
                        {
                            get: () => config.background_color || defaultConfig.background_color,
                            set: (value) => {
                                config.background_color = value;
                                window.elementSdk.setConfig({ background_color: value });
                            }
                        },
                        {
                            get: () => config.surface_color || defaultConfig.surface_color,
                            set: (value) => {
                                config.surface_color = value;
                                window.elementSdk.setConfig({ surface_color: value });
                            }
                        },
                        {
                            get: () => config.text_color || defaultConfig.text_color,
                            set: (value) => {
                                config.text_color = value;
                                window.elementSdk.setConfig({ text_color: value });
                            }
