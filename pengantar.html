<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Surat Pengantar PBB</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/di8stbg60/image/upload/v1757245484/SYAMDIGITAL-LOGO-2025_mmpllg.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#1e40af'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-serif">
    <div class="min-h-screen py-8">
        <div class="max-w-6xl mx-auto px-4">
            <!-- Header -->
            <div class="bg-white rounded-lg shadow-sm border p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center">
                            <span class="text-white font-bold text-xl">📄</span>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800">Generator Surat Pengantar PBB</h1>
                            <p class="text-gray-600">Buat surat pengantar pajak bumi dan bangunan secara otomatis</p>
                        </div>
                    </div>
                    <a href="https://syam.digital/" 
                       class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition-colors flex items-center space-x-2">
                        <span>🏠</span>
                        <span>Kembali ke Home</span>
                    </a>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Form Input -->
                <div class="bg-white rounded-lg shadow-sm border p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-6">Data Surat</h2>
                    
                    <form id="suratForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nomor Surat</label>
                            <input type="text" id="nomorSurat" value="283 / SP / PEM-DWLP / IX / 2025" 
                                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Kepada</label>
                            <input type="text" id="kepada" value="Kepala Badan Pendapatan Daerah" 
                                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Kabupaten/Kota</label>
                            <input type="text" id="kabupaten" value="Kabupaten Donggala" 
                                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nama Pemohon</label>
                            <input type="text" id="namaPemohon" value="ROSMI AL-MAHDALI" 
                                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nama Desa</label>
                            <input type="text" id="namaDesa" value="Wani Lumbumpetigo" 
                                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tanggal</label>
                            <input type="date" id="tanggal" value="2025-09-17" 
                                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nama Kepala Desa</label>
                            <input type="text" id="kepalaDesaNama" value="AMIR RAMANG" 
                                   class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                        </div>

                        <div class="pt-4">
                            <button type="button" onclick="generateSurat()" 
                                    class="w-full bg-primary text-white py-3 rounded-lg hover:bg-secondary transition-colors font-medium">
                                🔄 Generate Surat
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Preview Surat -->
                <div class="bg-white rounded-lg shadow-sm border">
                    <div class="p-6 border-b">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xl font-semibold text-gray-800">Preview Surat</h2>
                            <div class="flex space-x-2">
                                <button onclick="printSurat()" 
                                        class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition-colors">
                                    🖨️ Cetak
                                </button>
                                <button onclick="exportHTML()" 
                                        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                                    📄 Export HTML
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div id="suratPreview" class="p-8 font-serif text-sm leading-relaxed">
                        <!-- Surat content will be generated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateSurat() {
            const nomorSurat = document.getElementById('nomorSurat').value;
            const kepada = document.getElementById('kepada').value;
            const kabupaten = document.getElementById('kabupaten').value;
            const namaPemohon = document.getElementById('namaPemohon').value;
            const namaDesa = document.getElementById('namaDesa').value;
            const tanggal = document.getElementById('tanggal').value;
            const kepalaDesaNama = document.getElementById('kepalaDesaNama').value;

            // Format tanggal
            const dateObj = new Date(tanggal);
            const months = [
                'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
            ];
            const formattedDate = `${dateObj.getDate()} ${months[dateObj.getMonth()]} ${dateObj.getFullYear()}`;

            const suratHTML = `
                <div class="max-w-2xl mx-auto bg-white" style="font-family: 'Times New Roman', serif;">
                    <!-- Kop Surat -->
                    <div class="text-center mb-6">
                        <img src="https://res.cloudinary.com/dpr2vc3b0/image/upload/v1752847536/KOP-DESA-2025_t1etmr.png" 
                             alt="Kop Surat Desa" 
                             class="w-full max-w-4xl mx-auto mb-4"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                        <div style="display: none;" class="text-center p-4 border-2 border-gray-300 rounded">
                            <p class="text-gray-500">Kop Surat Desa</p>
                        </div>

                    </div>

                    <!-- Header -->
                    <div class="text-center mb-8">
                        <h1 class="text-lg font-bold mb-4 underline">SURAT PENGANTAR</h1>
                        <p class="mb-2">No : ${nomorSurat}</p>
                    </div>

                    <!-- Kepada -->
                    <div class="mb-6">
                        <div class="flex">
                            <div class="w-20">Kepada</div>
                        </div>
                        <div class="flex">
                            <div class="w-20">Yth</div>
                            <div class="w-4">:</div>
                            <div>${kepada}</div>
                        </div>
                        <div class="flex">
                            <div class="w-24"></div>
                            <div>${kabupaten}</div>
                        </div>
                        <div class="flex">
                            <div class="w-24"></div>
                            <div>Di-Tempat</div>
                        </div>
                    </div>

                    <!-- Tabel -->
                    <div class="mb-6">
                        <table class="w-full border-collapse border border-black">
                            <thead>
                                <tr>
                                    <th class="border border-black px-2 py-2 text-center w-12">No</th>
                                    <th class="border border-black px-2 py-2 text-center">Uraian</th>
                                    <th class="border border-black px-2 py-2 text-center w-24">Banyaknya</th>
                                    <th class="border border-black px-2 py-2 text-center w-32">Keterangan</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="border border-black px-2 py-2 text-center">1.</td>
                                    <td class="border border-black px-2 py-2">
                                        Permohonan Pembuatan SPPT<br>
                                        Pajak Bumi dan Bangunan ( PBB )<br>
                                        An. ${namaPemohon}
                                    </td>
                                    <td class="border border-black px-2 py-2 text-center">1 ( Satu ) Rangkap</td>
                                    <td class="border border-black px-2 py-2 text-center">
                                        Dikirim untuk di<br>
                                        Proses Selanjutnya
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Penutup -->
                    <div class="mb-8">
                        <p>Demikian disampaikan untuk Perlunya.</p>
                    </div>

                    <!-- Tanda Tangan -->
                    <div class="flex justify-end">
                        <div class="text-center">
                            <p class="mb-1">${namaDesa}, ${formattedDate}</p>
                            <p class="mb-16">Kepala Desa ${namaDesa}</p>
                            <p class="font-bold underline">${kepalaDesaNama}</p>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('suratPreview').innerHTML = suratHTML;
        }

        function printSurat() {
            const printContent = document.getElementById('suratPreview').innerHTML;
            const originalContent = document.body.innerHTML;

            document.body.innerHTML = `
                <div style="padding: 20px;">
                    ${printContent}
                </div>
            `;

            window.print();
            document.body.innerHTML = originalContent;
            
            // Re-attach event listeners after restoring content
            setTimeout(() => {
                location.reload();
            }, 100);
        }

        function exportHTML() {
            const suratContent = document.getElementById('suratPreview').innerHTML;
            const namaPemohon = document.getElementById('namaPemohon').value;
            const tanggal = document.getElementById('tanggal').value;
            
            // Create HTML content using array join method
            const htmlParts = [
                '<!DOCTYPE html>',
                '<html lang="id">',
                '<head>',
                '    <meta charset="UTF-8">',
                '    <meta name="viewport" content="width=device-width, initial-scale=1.0">',
                '    <title>Surat Pengantar PBB - ' + namaPemohon + '</title>',
                '    <script src="https://cdn.tailwindcss.com"><\/script>',
                '    <style>',
                '        @media print {',
                '            body { margin: 0; padding: 20px; }',
                '            .no-print { display: none; }',
                '        }',
                '    </style>',
                '</head>',
                '<body class="bg-white">',
                '    <div class="container mx-auto p-8">',
                '        ' + suratContent,
                '        <div class="text-center mt-8 no-print">',
                '            <button onclick="window.print()" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition-colors">',
                '                🖨️ Cetak Surat',
                '            </button>',
                '        </div>',
                '    </div>',
                '</body>',
                '</html>'
            ];
            
            const htmlContent = htmlParts.join('\n');
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Surat_Pengantar_PBB_' + namaPemohon.replace(/\s+/g, '_') + '_' + tanggal + '.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Generate initial preview
        document.addEventListener('DOMContentLoaded', function() {
            generateSurat();
            
            // Auto-generate on input change
            const inputs = document.querySelectorAll('#suratForm input');
            inputs.forEach(input => {
                input.addEventListener('input', generateSurat);
            });
        });
    </script>

</html>
