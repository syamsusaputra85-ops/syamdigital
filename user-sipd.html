   </div>
  </div><!-- Modal Rincian -->
  <div class="modal-overlay" id="detailModal">
   <div class="modal-content">
    <div class="modal-header">
     <h2 id="modalTitle">Rincian Desa</h2><button class="modal-close" onclick="closeModal()">✕</button>

  <script>
    // Data dari tabel yang diberikan - dioptimalkan untuk loading cepat
    const allData = [
      { no: 1, kecamatan: 'Tanantovea', desa: 'Wani Satu', kepala: 'ZAINUDIN NY', username: 'desawani1', password: '' },
      { no: 2, kecamatan: 'Tanantovea', desa: 'Wani Dua', kepala: 'Sunardin, SE', username: 'desawani2', password: 'donggalakab01#@!A' },
      { no: 3, kecamatan: 'Tanantovea', desa: 'Nupa Bomba', kepala: 'IDRAL', username: 'desanupabomba', password: 'donggalakab01#@!A' },
      { no: 4, kecamatan: 'Tanantovea', desa: 'Wombo', kepala: 'RUBERT', username: 'desawombo', password: 'donggalakab01#@!A' },
      { no: 5, kecamatan: 'Tanantovea', desa: 'Guntarano', kepala: 'Uswatun Hasanah, SE (Pj)', username: 'desaguntarano', password: 'donggalakab01#@!A' },
      { no: 6, kecamatan: 'Tanantovea', desa: 'Bale', kepala: 'Adam', username: 'desabale', password: 'donggalakab01#@!A' },
      { no: 7, kecamatan: 'Tanantovea', desa: 'Wombo Mpanau', kepala: 'MOHAMAD NASIR', username: 'desawombompanau', password: 'donggalakab01#@!A' },
      { no: 8, kecamatan: 'Tanantovea', desa: 'Wombo Kalonggo', kepala: 'Zulfikar, S.Pd', username: 'desawombokalonggo', password: 'donggalakab01#@!A' },
      { no: 9, kecamatan: 'Tanantovea', desa: 'Wani Tiga', kepala: 'Amran', username: 'desawani3', password: 'donggalakab01#@!A' },
      { no: 10, kecamatan: 'Tanantovea', desa: 'Wani Lumbumpetigo', kepala: 'Amir Ramang', username: 'desalumbupetigo', password: 'donggalakab01#@!A' }
    ];

    let filteredData = [...allData];
    let isInitialized = false;
    const defaultConfig = {
      app_title: 'Pencarian Data User SIPD-RI',
      search_placeholder: 'Cari berdasarkan nama desa atau kepala desa...'
    };
    let config = { ...defaultConfig };

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (newConfig) => {
          config = newConfig;
          document.getElementById('app-title').textContent = config.app_title || defaultConfig.app_title;
          document.getElementById('searchInput').placeholder = config.search_placeholder || defaultConfig.search_placeholder;
        },
        mapToCapabilities: () => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: () => new Map([
          ['app_title', config.app_title || defaultConfig.app_title],
          ['search_placeholder', config.search_placeholder || defaultConfig.search_placeholder]
        ])
      });
    }

    // Setup filter dropdown
    function setupFilters() {
      const kecamatanSet = new Set(allData.map(item => item.kecamatan));
      const kecamatanFilter = document.getElementById('kecamatanFilter');
      
      Array.from(kecamatanSet).sort().forEach(kecamatan => {
        const option = document.createElement('option');
        option.value = kecamatan;
        option.textContent = kecamatan;
        kecamatanFilter.appendChild(option);
      });
    }

    // Filter and search data
    function filterData() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const kecamatanTerm = document.getElementById('kecamatanFilter').value;

      filteredData = allData.filter(item => {
        const matchSearch = !searchTerm || 
          item.desa.toLowerCase().includes(searchTerm) ||
          item.kepala.toLowerCase().includes(searchTerm) ||
          item.username.toLowerCase().includes(searchTerm);
        
        const matchKecamatan = !kecamatanTerm || item.kecamatan === kecamatanTerm;

        return matchSearch && matchKecamatan;
      });

      renderTable();
      updateResultCount();
    }

    // Highlight search term in text
    function highlightText(text, term) {
      if (!term) return text;
      const regex = new RegExp(`(${term})`, 'gi');
      return text.replace(regex, '<span class="highlight">$1</span>');
    }

    // Render table dengan optimisasi
    function renderTable() {
      const tableBody = document.getElementById('tableBody');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();

      if (filteredData.length === 0) {
        tableBody.innerHTML = '<tr class="no-data"><td colspan="6">Tidak ada data yang ditemukan</td></tr>';
        return;
      }

      // Render rows secara batch untuk performa lebih baik
      const fragment = document.createDocumentFragment();
      filteredData.forEach((item, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${item.no}</td>
          <td>${highlightText(item.kecamatan, searchTerm)}</td>
          <td><span class="desa-name" onclick="openModal(${index})">${highlightText(item.desa, searchTerm)}</span></td>
          <td>${highlightText(item.kepala, searchTerm)}</td>
          <td><code style="background: #f0f0f0; padding: 4px 8px; border-radius: 4px; font-size: 12px;">${highlightText(item.username, searchTerm)}</code></td>
          <td><code style="background: #f0f0f0; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;">●●●●●●●●●●●●</code></td>
        `;
        fragment.appendChild(tr);
      });
      tableBody.innerHTML = '';
      tableBody.appendChild(fragment);
    }

    // Update result count
    function updateResultCount() {
      document.getElementById('resultCount').textContent = filteredData.length;
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', filterData);
    document.getElementById('kecamatanFilter').addEventListener('change', filterData);

    // Initialize - dipanggil secepatnya
    if (!isInitialized) {
      isInitialized = true;
      setupFilters();
      renderTable();
      updateResultCount();
    }

    // Modal functions
    function openModal(index) {
      const item = filteredData[index];
      if (!item) return;

      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');
      
      modalTitle.textContent = `Rincian - ${item.desa}`;
      
      modalBody.innerHTML = `
        <div class="detail-row">
          <span class="detail-label">No.</span>
          <span class="detail-value">${item.no}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Kecamatan</span>
          <span class="detail-value">${item.kecamatan}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Desa</span>
          <span class="detail-value">${item.desa}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Kepala Desa</span>
          <span class="detail-value">${item.kepala}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Username</span>
          <span class="detail-value">
            ${item.username}
            <button class="copy-btn" onclick="copyToClipboard('${item.username}', this)">Salin</button>
          </span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Password</span>
          <span class="detail-value">
            <div class="password-row">
              <span id="passwordDisplay">●●●●●●●●●●●</span>
              <button class="password-toggle" onclick="togglePassword('${item.password}')">Tampilkan</button>
              <button class="copy-btn" onclick="copyToClipboard('${item.password}', this)">Salin</button>
            </div>
          </span>
        </div>
        <button class="share-button" onclick="shareToWhatsApp('${item.desa}', '${item.kepala}', '${item.username}', '${item.password}')">
          📱 Bagikan ke WhatsApp
        </button>
      `;

      document.getElementById('detailModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('active');
    }

    function togglePassword(password) {
      const display = document.getElementById('passwordDisplay');
      const toggle = event.target;
      
      if (display.textContent === '●●●●●●●●●●●') {
        display.textContent = password;
        toggle.textContent = 'Sembunyikan';
      } else {
        display.textContent = '●●●●●●●●●●●●';
        toggle.textContent = 'Tampilkan';
      }
    }

    function copyToClipboard(text, button) {
      navigator.clipboard.writeText(text).then(() => {
        const originalText = button.textContent;
        button.textContent = 'Tersalin!';
        setTimeout(() => {
          button.textContent = originalText;
        }, 2000);
      }).catch(err => {
        console.error('Gagal menyalin:', err);
        button.textContent = 'Gagal';
      });
    }

    // Close modal when clicking outside
    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    function shareToWhatsApp(desa, kepala, username, password) {
      const message = `*RINCIAN DATA DESA*%0A%0A*Nama Desa:* ${encodeURIComponent(desa)}%0A*Kepala Desa:* ${encodeURIComponent(kepala)}%0A*Username:* ${encodeURIComponent(username)}%0A*Password:* ${encodeURIComponent(password)}%0A%0A*Kunjungi:* https://syam.digital/user-sipd`;
      const whatsappUrl = `https://wa.me/?text=${message}`;
      window.open(whatsappUrl, '_blank');
    }

    function shareAppToWhatsApp() {
      const appTitle = document.getElementById('app-title').textContent;
      const message = `*${encodeURIComponent(appTitle)}*%0A%0AHalo! Saya ingin berbagi aplikasi pencarian data user SIPD-RI semoga membantu.%0A%0A🔗 *Kunjungi:* https://syam.digital/user-sipd%0A%0ADapatkan informasi lengkap tentang desa, kepala desa, username, dan akses yang diperlukan dengan mudah!`;
      const whatsappUrl = `https://wa.me/?text=${message}`;
      window.open(whatsappUrl, '_blank');
    }
  </script>

.like-btn.active {

}
.dislike-btn {

  <script>

  var container = btn.parentElement;
  var allBtns = container.querySelectorAll('.vote-btn');
  var feedback = document.getElementById('voteFeedback');
  
  allBtns.forEach(function(b) { b.classList.remove('active'); });
  
  if (currentVoteBlog === type) {

    btn.classList.add('active');
    
    if (type === 'like') {

      feedback.style.color = '#2e7d32';

    }
    feedback.classList.add('show');
  }
}

  <script>
    const defaultConfig = {
      button_text: 'SIPD-RI Kemendagri',
      subtitle_text: 'Sistem Informasi Pemerintahan Daerah',
      primary_color: '#3b82f6',
      background_color: '#f8fafc',
      surface_color: '#ffffff',
      text_color: '#1e293b',
      secondary_text_color: '#64748b'
    };

    let config = { ...defaultConfig };

    async function onConfigChange(cfg) {
      config = { ...defaultConfig, ...cfg };
      
      // Update text content
      const buttonText = document.getElementById('button-text');
      const subtitleText = document.getElementById('subtitle-text');
      
      if (buttonText) {
        buttonText.textContent = config.button_text || defaultConfig.button_text;
        buttonText.style.color = config.text_color || defaultConfig.text_color;
      }
      
      if (subtitleText) {
        subtitleText.textContent = config.subtitle_text || defaultConfig.subtitle_text;
        subtitleText.style.color = config.secondary_text_color || defaultConfig.secondary_text_color;
      }
      
      // Update background
      const container = document.getElementById('app-container');
      if (container) {
        container.style.background = config.background_color || defaultConfig.background_color;
      }
    }

    function mapToCapabilities(cfg) {
      return {
        recolorables: [
          {
            get: () => cfg.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => cfg.surface_color || defaultConfig.surface_color,
            set: (value) => {
              config.surface_color = value;
              window.elementSdk.setConfig({ surface_color: value });
            }
          },
          {
            get: () => cfg.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          },
          {
            get: () => cfg.primary_color || defaultConfig.primary_color,
            set: (value) => {
              config.primary_color = value;
              window.elementSdk.setConfig({ primary_color: value });
            }
          },
          {
            get: () => cfg.secondary_text_color || defaultConfig.secondary_text_color,
            set: (value) => {
              config.secondary_text_color = value;
              window.elementSdk.setConfig({ secondary_text_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(cfg) {
      return new Map([
        ['button_text', cfg.button_text || defaultConfig.button_text],
        ['subtitle_text', cfg.subtitle_text || defaultConfig.subtitle_text]
      ]);
    }

    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
