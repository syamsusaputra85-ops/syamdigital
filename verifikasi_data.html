<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" type="image/png" href="https://syam.digital/desa_wani_lumbumpetigo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi TTE Kabupaten Donggala</title>
    <style>
        :root {
            --primary: #00c853;
            --bg: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .verification-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 380px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        /* Animasi Garis Scan */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: scan 3s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }

        .logo-kab {
            height: 80px;
            margin-bottom: 1rem;
        }

        .status-badge {
            background: rgba(0, 200, 83, 0.1);
            color: var(--primary);
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1rem;
            border: 1px solid var(--primary);
        }

        .qr-preview {
            width: 140px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            margin: 10px auto 20px;
            display: block;
        }

        .details {
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: 12px;
            text-align: left;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .details div {
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .label { color: #64748b; }
        .value { font-weight: 600; color: #f1f5f9; }

        /* Tombol Link Manual */
        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--primary);
            color: white;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-link:hover {
            background: #00e676;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 200, 83, 0.3);
        }
    </style>
</head>
<body>

<div class="verification-card">
    <div class="scan-line"></div>
    
    <!-- Logo -->
<center><img src="https://syam.digital/desa_wani_lumbumpetigo.png" style="width:15%; height:auto;" alt="Kabupaten Donggala" class="logo-kab"></center>
    
    <div class="status-badge">TERVERIFIKASI ASLI ✓</div>
    
    <h2 style="margin:0;">SYAMSUDDIN</h2>
    <p style="font-size: 0.8rem; color: #94a3b8; margin: 5px 0 15px;">Pemerintah Desa Wani Lumbumpetigo</p>

    <!-- QR Code -->
    <img src="https://syam.digital/syamsuddin.png" class="qr-preview" alt="QR Code">

    <div class="details">
        <div><span class="label">ID Dokumen:</span> <span class="value">PEM-DWLP-LEGAL-2026</span></div>
        <div><span class="label">Status:</span> <span class="value" style="color: var(--primary);">SAH (UU ITE)</span></div>
    </div>

    <!-- LINK MANUAL KE PDF -->
    <!-- Ganti '#' dengan link URL file PDF Anda yang sebenarnya -->
    <a href="https://syam.digital/syamsuddin.pdf" class="btn-link" target="_blank">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        BUKA / UNDUH PDF
    </a>
</div>

</body>
</html>
