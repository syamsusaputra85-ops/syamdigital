    <style>
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); }
        }
        
        @keyframes spin-dots {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes bounce-in {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .loading-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: bounce-in 0.6s ease-out;
        }
        
        .loading-btn:hover {
            transform: translateY(-2px) scale(1.02);
            animation: pulse-glow 2s infinite;
        }
        
        .loading-spinner {
            display: none;
            animation: spin-dots 1s linear infinite;
        }
        
        .loading-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }
        
        .loading-btn.loading .loading-spinner {
            display: inline-block;
        }
        
        .loading-btn.loading .button-text {
            display: none;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .gradient-bg:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
    </style>

            12: 'https://t.me/syamdigital',
            13: 'https://www.tiktok.com/@syamdigital',
            14: 'https://github.com/syamdigital',
            15: 'https://www.behance.net/syamdigital',
            16: 'https://dribbble.com/syamdigital',
            17: 'https://www.pinterest.com/syamdigital',
            18: 'https://medium.com/@syamdigital',
            19: 'https://www.reddit.com/u/syamdigital',
            20: 'https://www.syam.digital/blog'
        };

        function handleClick(button) {
            // Get button number from data attribute
            const buttonNumber = parseInt(button.getAttribute('data-button'));
            const targetUrl = buttonLinks[buttonNumber] || 'https://www.syam.digital/';
            
            // Add loading state
            button.classList.add('loading');
            
            // Simulate loading for 2 seconds, then redirect
            setTimeout(() => {
                window.open(targetUrl, '_blank');
                
                // Remove loading state after redirect
                setTimeout(() => {
                    button.classList.remove('loading');
                }, 500);
            }, 2000);
        }
        
        // Add staggered animation on page load
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('.loading-btn');
            buttons.forEach((button, index) => {
                button.style.animationDelay = `${index * 0.1}s`;
            });
        });
    </script>
