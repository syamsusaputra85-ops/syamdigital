<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slip Gaji Pemerintah Desa</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&amp;family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; }
    .heading-font { font-family: 'Playfair Display', serif; }
    @media print {
      .no-print { display: none !important; }
      .slip-card { break-inside: avoid; box-shadow: none !important; border: 1px solid #ccc !important; }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto bg-stone-100">
  <div class="w-full min-h-full py-8 px-4" id="app-wrapper"><!-- Header -->
   <div class="max-w-4xl mx-auto mb-8 text-center no-print">
    <h1 class="heading-font text-3xl font-bold text-stone-800 mb-1" id="main-title">Slip Gaji Perangkat Desa</h1>
    <p class="text-stone-500 text-sm" id="sub-title">Pemerintah Desa Wani Lumbumpetigo</p>
    <div class="flex items-center justify-center gap-2 mt-1">
     <p class="text-stone-400 text-xs" id="period-text">Periode: 25 Mei 2026</p><button id="edit-period-btn" class="ml-2 px-2 py-1 text-xs bg-stone-300 hover:bg-stone-400 text-stone-700 rounded transition font-medium" title="Edit tanggal periode">✎ Edit</button>
    </div>
   </div><!-- Edit Period Modal -->
   <div id="period-modal" class="fixed inset-0 bg-black/30 flex items-center justify-center z-50 hidden no-print">
    <div class="bg-white rounded-lg shadow-lg p-6 max-w-sm w-full mx-4">
     <h2 class="text-lg font-bold text-stone-800 mb-4">Edit Tanggal Periode</h2>
     <div class="space-y-3 mb-6">
      <div><label class="block text-xs font-semibold text-stone-600 mb-1">Tanggal</label> <input type="number" id="edit-period-date" min="1" max="31" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm">
      </div>
      <div><label class="block text-xs font-semibold text-stone-600 mb-1">Bulan</label> <input type="text" id="edit-period-month" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm">
      </div>
      <div><label class="block text-xs font-semibold text-stone-600 mb-1">Tahun</label> <input type="number" id="edit-period-year" min="2000" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm">
      </div>
     </div>
     <div class="flex gap-3"><button id="cancel-period-btn" class="flex-1 px-4 py-2 bg-stone-200 text-stone-800 rounded-lg font-medium hover:bg-stone-300 transition">Batal</button> <button id="save-period-btn" class="flex-1 px-4 py-2 bg-stone-800 text-white rounded-lg font-medium hover:bg-stone-700 transition">Simpan</button>
     </div>
    </div>
   </div><!-- Print Button -->
   <div class="max-w-4xl mx-auto mb-6 flex justify-end no-print"><button id="print-btn" class="flex items-center gap-2 bg-stone-800 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-stone-700 transition"> <i data-lucide="printer" style="width:16px;height:16px;"></i> Cetak Semua Slip </button>
   </div><!-- Edit Payment Date Modal -->
   <div id="payment-modal" class="fixed inset-0 bg-black/30 flex items-center justify-center z-50 hidden no-print">
    <div class="bg-white rounded-lg shadow-lg p-6 max-w-sm w-full mx-4">
     <h2 class="text-lg font-bold text-stone-800 mb-4">Edit Tanggal Pembayaran</h2>
     <div class="mb-6"><label class="block text-xs font-semibold text-stone-600 mb-1">Tanggal &amp; Bulan</label> <input type="text" id="edit-payment-date" placeholder="Contoh: 25 Mei 2026" class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm">
     </div>
     <div class="flex gap-3"><button id="cancel-payment-btn" class="flex-1 px-4 py-2 bg-stone-200 text-stone-800 rounded-lg font-medium hover:bg-stone-300 transition">Batal</button> <button id="save-payment-btn" class="flex-1 px-4 py-2 bg-stone-800 text-white rounded-lg font-medium hover:bg-stone-700 transition">Simpan</button>
     </div>
    </div>
   </div><!-- Slips Container -->
   <div class="max-w-4xl mx-auto space-y-6" id="slips-container"></div>
  </div>
  <script>
    const defaultConfig = {
      village_name: 'Pemerintah Desa Wani Lumbumpetigo',
      period_date: '25',
      period_month: 'Mei',
      period_year: '2026',
      payment_date: '25 Mei 2026',
      num_months: '1',
      background_color: '#f5f5f4',
      surface_color: '#ffffff',
      text_color: '#1c1917',
      accent_color: '#292524',
      border_color: '#d6d3d1',
      font_family: 'Source Sans 3',
      font_size: 14
    };

    const employees = [
      { name: 'AMIR RAMANG', position: 'Kepala Desa', salary: 2450000, volume: 1 },
      { name: 'SYAMSUDDIN', position: 'Sekretaris Desa', salary: 2250000, volume: 1 },
      { name: 'SUNARTIN', position: 'Kaur Keuangan', salary: 2050000, volume: 1 },
      { name: 'AL-ZAHRIN LAHASE', position: 'Kaur Perencanaan', salary: 2050000, volume: 1 },
      { name: 'FITRIA', position: 'Kaur Umum dan Aset', salary: 2050000, volume: 1 }
    ];

    function formatRupiah(n) {
      return 'Rp ' + n.toLocaleString('id-ID');
    }

    function terbilang(n) {
      const satuan = ['', 'Satu', 'Dua', 'Tiga', 'Empat', 'Lima', 'Enam', 'Tujuh', 'Delapan', 'Sembilan', 'Sepuluh', 'Sebelas'];
      if (n < 12) return satuan[n];
      if (n < 20) return satuan[n - 10] + ' Belas';
      if (n < 100) return satuan[Math.floor(n / 10)] + ' Puluh' + (n % 10 ? ' ' + satuan[n % 10] : '');
      if (n < 200) return 'Seratus' + (n % 100 ? ' ' + terbilang(n % 100) : '');
      if (n < 1000) return satuan[Math.floor(n / 100)] + ' Ratus' + (n % 100 ? ' ' + terbilang(n % 100) : '');
      if (n < 2000) return 'Seribu' + (n % 1000 ? ' ' + terbilang(n % 1000) : '');
      if (n < 1000000) return terbilang(Math.floor(n / 1000)) + ' Ribu' + (n % 1000 ? ' ' + terbilang(n % 1000) : '');
      if (n < 1000000000) return terbilang(Math.floor(n / 1000000)) + ' Juta' + (n % 1000000 ? ' ' + terbilang(n % 1000000) : '');
      return n.toString();
    }

    function buildSlips() {
      const container = document.getElementById('slips-container');
      container.innerHTML = '';
      const cfg = window.elementSdk?.config || defaultConfig;
      const village = cfg.village_name || defaultConfig.village_name;
      const periodDate = cfg.period_date || defaultConfig.period_date;
      const periodMonth = cfg.period_month || defaultConfig.period_month;
      const periodYear = cfg.period_year || defaultConfig.period_year;
      const periodDisplay = `${periodDate} ${periodMonth} ${periodYear}`;
      const numMonths = parseInt(cfg.num_months || defaultConfig.num_months) || 1;

      employees.forEach((emp, i) => {
        const card = document.createElement('div');
        card.className = 'slip-card rounded-xl p-0 overflow-hidden shadow-md';
        card.style.backgroundColor = cfg.surface_color || defaultConfig.surface_color;
        card.style.border = `1px solid ${cfg.border_color || defaultConfig.border_color}`;

        const ff = `${cfg.font_family || defaultConfig.font_family}, Source Sans 3, sans-serif`;
        const fs = cfg.font_size || defaultConfig.font_size;
        const tc = cfg.text_color || defaultConfig.text_color;
        const ac = cfg.accent_color || defaultConfig.accent_color;

        card.innerHTML = `
          <!-- Header -->
          <div style="background:${ac}; padding: 20px 28px;" class="flex items-center justify-between">
            <div>
              <div style="font-family:Playfair Display,serif; font-size:${fs * 1.15}px; color:#fff; font-weight:700;">${village}</div>
              <div style="font-family:${ff}; font-size:${fs * 0.85}px; color:rgba(255,255,255,0.7); margin-top:2px;">SLIP GAJI PERANGKAT DESA</div>
            </div>
            <div style="font-family:${ff}; font-size:${fs * 0.8}px; color:rgba(255,255,255,0.6); text-align:right;">
              Periode<br><span style="color:#fff;font-weight:600;font-size:${fs}px;">${periodDisplay}</span>
            </div>
          </div>

          <!-- Body -->
          <div style="padding: 24px 28px; font-family:${ff}; color:${tc};">
            <!-- Employee Info -->
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px 32px; margin-bottom:20px;">
              <div>
                <div style="font-size:${fs * 0.75}px; color:#78716c; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px;">Nama</div>
                <div style="font-size:${fs * 1.1}px; font-weight:700;">${emp.name}</div>
              </div>
              <div>
                <div style="font-size:${fs * 0.75}px; color:#78716c; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px;">Jabatan</div>
                <div style="font-size:${fs * 1.1}px; font-weight:600;">${emp.position}</div>
              </div>
            </div>

            <!-- Divider -->
            <div style="height:1px; background:${cfg.border_color || defaultConfig.border_color}; margin-bottom:16px;"></div>

            <!-- Salary Table -->
            <table style="width:100%; font-size:${fs}px; border-collapse:collapse;">
              <thead>
                <tr style="border-bottom:2px solid ${cfg.border_color || defaultConfig.border_color};">
                  <th style="text-align:left; padding:8px 0; font-size:${fs * 0.78}px; text-transform:uppercase; letter-spacing:0.5px; color:#78716c;">Uraian</th>
                  <th style="text-align:right; padding:8px 0; font-size:${fs * 0.78}px; text-transform:uppercase; letter-spacing:0.5px; color:#78716c;">Jumlah</th>
                </tr>
              </thead>
              <tbody>
                <tr style="border-bottom:1px solid ${cfg.border_color || defaultConfig.border_color};">
                  <td style="padding:10px 0;">Penghasilan Tetap (Siltap)</td>
                  <td style="padding:10px 0; text-align:right; font-weight:600;">${formatRupiah(emp.salary)}</td>
                </tr>
                <tr style="border-bottom:1px solid ${cfg.border_color || defaultConfig.border_color};">
                  <td style="padding:10px 0; font-size:${fs * 0.9}px; color:#78716c;">
                    <div style="display:flex; align-items:center; gap:8px;">
                      Volume Bulan
                      <input type="number" value="${emp.volume}" min="1" max="12" style="width:50px; padding:4px 8px; border:1px solid ${cfg.border_color}; border-radius:4px; font-size:${fs * 0.9}px;" class="volume-input" data-emp-index="${i}">
                    </div>
                  </td>
                  <td style="padding:10px 0; text-align:right; font-weight:600; font-size:${fs * 0.9}px; color:${tc};" volume-total-display>${formatRupiah(emp.salary * emp.volume)}</td>
                </tr>
              </tbody>
              <tfoot>
                <tr>
                  <td style="padding:12px 0; font-weight:700; font-size:${fs * 1.05}px;">TOTAL DITERIMA</td>
                  <td style="padding:12px 0; text-align:right; font-weight:800; font-size:${fs * 1.15}px; color:${ac};" total-display>${formatRupiah(emp.salary * emp.volume)}</td>
                </tr>
              </tfoot>
            </table>

            <!-- Terbilang -->
            <div style="background:${cfg.background_color || defaultConfig.background_color}; border-radius:8px; padding:10px 14px; margin-top:12px; font-size:${fs * 0.85}px;">
              <span style="color:#78716c;">Terbilang:</span> <em style="font-weight:600;" terbilang-display>${terbilang(emp.salary * emp.volume)} Rupiah</em>
            </div>

            <!-- Signatures -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:28px; text-align:center; font-size:${fs * 0.88}px;">
              <div>
                <div style="color:#78716c; margin-bottom:2px; display:flex; align-items:center; justify-content:center; gap:6px;">
                  <span>${cfg.payment_date || defaultConfig.payment_date}</span>
                  <button class="edit-payment-btn" style="padding:2px 6px; background:#d6d3d1; border:none; border-radius:3px; cursor:pointer; font-size:${fs * 0.75}px; color:#78716c; hover:background:#c7c4c0; transition:background 0.2s;" data-emp-index="${i}" title="Edit tanggal pembayaran">✎</button>
                </div>
                <div style="color:#78716c;">Mengetahui,</div>
                <div style="font-weight:600;">Kepala Desa</div>
                <div style="height:50px;"></div>
                <div style="font-weight:700; border-top:1px solid ${tc}; display:inline-block; padding-top:4px;">AMIR RAMANG</div>
              </div>
              <div>
                <div style="color:#78716c; margin-bottom:2px; display:flex; align-items:center; justify-content:center; gap:6px;">
                  <span>${cfg.payment_date || defaultConfig.payment_date}</span>
                  <button class="edit-payment-btn" style="padding:2px 6px; background:#d6d3d1; border:none; border-radius:3px; cursor:pointer; font-size:${fs * 0.75}px; color:#78716c; hover:background:#c7c4c0; transition:background 0.2s;" data-emp-index="${i}" title="Edit tanggal pembayaran">✎</button>
                </div>
                <div style="color:#78716c;">Penerima,</div>
                <div style="font-weight:600;">${emp.position}</div>
                <div style="height:50px;"></div>
                <div style="font-weight:700; border-top:1px solid ${tc}; display:inline-block; padding-top:4px;">${emp.name}</div>
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });

      // Attach event listeners to volume inputs
      document.querySelectorAll('.volume-input').forEach(input => {
        input.addEventListener('input', (e) => {
          const newVolume = parseInt(e.target.value) || 1;
          const empIndex = parseInt(e.target.dataset.empIndex);
          
          // Update employee volume in array
          employees[empIndex].volume = newVolume;
          
          const emp = employees[empIndex];
          const card = e.target.closest('.slip-card');
          
          // Update volume total display
          const newTotal = emp.salary * newVolume;
          const volumeTotalElement = card.querySelector('[volume-total-display]');
          if (volumeTotalElement) volumeTotalElement.textContent = formatRupiah(newTotal);
          
          // Update grand total
          const totalElement = card.querySelector('[total-display]');
          if (totalElement) totalElement.textContent = formatRupiah(newTotal);
          
          // Update terbilang
          const terbilangElement = card.querySelector('[terbilang-display]');
          if (terbilangElement) terbilangElement.textContent = terbilang(newTotal) + ' Rupiah';
        });
      });

      // Attach event listeners to payment date edit buttons
      document.querySelectorAll('.edit-payment-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const modal = document.getElementById('payment-modal');
          const input = document.getElementById('edit-payment-date');
          const cfg = window.elementSdk?.config || defaultConfig;
          input.value = cfg.payment_date || defaultConfig.payment_date;
          input.focus();
          modal.classList.remove('hidden');
        });
      });

      // Recreate Lucide icons after building slips
      lucide.createIcons();
    }

    // Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const bg = config.background_color || defaultConfig.background_color;
        document.getElementById('app-wrapper').style.backgroundColor = bg;

        const ff = `${config.font_family || defaultConfig.font_family}, Source Sans 3, sans-serif`;
        const fs = config.font_size || defaultConfig.font_size;
        const tc = config.text_color || defaultConfig.text_color;

        const title = document.getElementById('main-title');
        title.style.color = tc;
        title.style.fontSize = `${fs * 2}px`;

        const sub = document.getElementById('sub-title');
        sub.textContent = config.village_name || defaultConfig.village_name;
        sub.style.fontFamily = ff;
        sub.style.color = config.border_color || defaultConfig.border_color;

        const per = document.getElementById('period-text');
        per.textContent = `Periode: ${config.period_date || defaultConfig.period_date} ${config.period_month || defaultConfig.period_month} ${config.period_year || defaultConfig.period_year}`;
        per.style.fontFamily = ff;

        buildSlips();
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          { get: () => config.border_color || defaultConfig.border_color, set: (v) => { config.border_color = v; window.elementSdk.setConfig({ border_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['village_name', config.village_name || defaultConfig.village_name],
        ['period_date', config.period_date || defaultConfig.period_date],
        ['period_month', config.period_month || defaultConfig.period_month],
        ['period_year', config.period_year || defaultConfig.period_year],
        ['payment_date', config.payment_date || defaultConfig.payment_date],
        ['num_months', config.num_months || defaultConfig.num_months]
      ])
    });

    lucide.createIcons();
    buildSlips();

    // Edit Period Modal Handler
    const periodModal = document.getElementById('period-modal');
    const editPeriodBtn = document.getElementById('edit-period-btn');
    const cancelPeriodBtn = document.getElementById('cancel-period-btn');
    const savePeriodBtn = document.getElementById('save-period-btn');
    const editPeriodDate = document.getElementById('edit-period-date');
    const editPeriodMonth = document.getElementById('edit-period-month');
    const editPeriodYear = document.getElementById('edit-period-year');

    editPeriodBtn.addEventListener('click', () => {
      const cfg = window.elementSdk?.config || defaultConfig;
      editPeriodDate.value = cfg.period_date || defaultConfig.period_date;
      editPeriodMonth.value = cfg.period_month || defaultConfig.period_month;
      editPeriodYear.value = cfg.period_year || defaultConfig.period_year;
      periodModal.classList.remove('hidden');
    });

    cancelPeriodBtn.addEventListener('click', () => {
      periodModal.classList.add('hidden');
    });

    savePeriodBtn.addEventListener('click', () => {
      const newDate = editPeriodDate.value;
      const newMonth = editPeriodMonth.value;
      const newYear = editPeriodYear.value;

      if (newDate && newMonth && newYear) {
        window.elementSdk.setConfig({
          period_date: newDate,
          period_month: newMonth,
          period_year: newYear
        });
        periodModal.classList.add('hidden');
      }
    });

    // Close modal on background click
    periodModal.addEventListener('click', (e) => {
      if (e.target === periodModal) {
        periodModal.classList.add('hidden');
      }
    });

    // Edit Payment Date Modal Handler
    const paymentModal = document.getElementById('payment-modal');
    const cancelPaymentBtn = document.getElementById('cancel-payment-btn');
    const savePaymentBtn = document.getElementById('save-payment-btn');
    const editPaymentDate = document.getElementById('edit-payment-date');

    cancelPaymentBtn.addEventListener('click', () => {
      paymentModal.classList.add('hidden');
    });

    savePaymentBtn.addEventListener('click', () => {
      const newPaymentDate = editPaymentDate.value;
      if (newPaymentDate) {
        window.elementSdk.setConfig({
          payment_date: newPaymentDate
        });
        paymentModal.classList.add('hidden');
      }
    });

    // Close modal on background click
    paymentModal.addEventListener('click', (e) => {
      if (e.target === paymentModal) {
        paymentModal.classList.add('hidden');
      }
    });

    // Print button handler
    document.getElementById('print-btn').addEventListener('click', () => {
      const printWindow = window.open('', '_blank', 'width=900,height=1200');
      
      if (printWindow) {
        const container = document.getElementById('slips-container');
        const header = document.getElementById('main-title').parentElement;
        
        const htmlContent = `
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Slip Gaji</title>
            <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
            <style>
              body { 
                font-family: 'Source Sans 3', Arial, sans-serif;
                margin: 0;
                padding: 20px;
                background: #f5f5f4;
              }
              .heading-font { font-family: 'Playfair Display', serif; }
              @media print {
                body { margin: 0; padding: 10px; }
                .slip-card { break-inside: avoid; margin-bottom: 20px; }
              }
            </style>
          </head>
          <body>
            ${header.innerHTML}
            ${container.innerHTML}
            <script>
              setTimeout(() => window.print(), 500);
            <\/script>
          </body>
          </html>
        `;
        
        printWindow.document.write(htmlContent);
        printWindow.document.close();
      }
    });
  </script>
