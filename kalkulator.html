     </div><!-- Buttons Grid -->
     <div class="grid grid-cols-4 gap-2"><!-- Row 1 --> <button class="calculator-btn function-btn" data-action="clear">C</button> <button class="calculator-btn function-btn" data-action="delete">⌫</button> <button class="calculator-btn function-btn" data-operation="÷">÷</button> <button class="calculator-btn operator-btn" data-operation="×">×</button> <!-- Row 2 --> <button class="calculator-btn number-btn" data-number="7">7</button> <button class="calculator-btn number-btn" data-number="8">8</button> <button class="calculator-btn number-btn" data-number="9">9</button> <button class="calculator-btn operator-btn" data-operation="-">−</button> <!-- Row 3 --> <button class="calculator-btn number-btn" data-number="4">4</button> <button class="calculator-btn number-btn" data-number="5">5</button> <button class="calculator-btn number-btn" data-number="6">6</button> <button class="calculator-btn operator-btn" data-operation="+">+</button> <!-- Row 4 --> <button class="calculator-btn number-btn" data-number="1">1</button> <button class="calculator-btn number-btn" data-number="2">2</button> <button class="calculator-btn number-btn" data-number="3">3</button> <button class="calculator-btn equals-btn row-span-2" data-action="equals">=</button> <!-- Row 5 --> <button class="calculator-btn number-btn col-span-2" data-number="0">0</button> <button class="calculator-btn number-btn" data-number=".">.</button>

  <style>
    .calculator-btn {
      padding: 1.25rem;
      border-radius: 1rem;
      font-size: 1.125rem;
      font-weight: 300;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .calculator-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .calculator-btn:active {
      transform: translateY(0);
    }

    .number-btn {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .number-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .function-btn {
      background: rgba(255, 255, 255, 0.05);
      color: #f59e0b;
      font-weight: 400;
    }

    .function-btn:hover {
      background: rgba(245, 158, 11, 0.1);
    }

    .operator-btn {
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      font-weight: 400;
    }

    .operator-btn:hover {
      background: rgba(99, 102, 241, 0.25);
    }

    .equals-btn {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #ffffff;
      font-weight: 400;
      font-size: 1.5rem;
    }

    .equals-btn:hover {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }

    .row-span-2 {
      grid-row: span 2;

    .col-span-2 {

  <script>
    // Default configuration
    const defaultConfig = {
      calculator_title: "Kalkulator",
      background_color: "#0f0f0f",
      surface_color: "#1e1e1e",
      text_color: "#ffffff",
      operator_color: "#6366f1",
      accent_color: "#f59e0b"
    };

    // Calculator state
    let currentOperand = '0';
    let previousOperand = '';
    let operation = null;
    let shouldResetScreen = false;

    const currentOperandElement = document.getElementById('current-operand');
    const previousOperandElement = document.getElementById('previous-operand');

    // Number buttons
    document.querySelectorAll('[data-number]').forEach(button => {
      button.addEventListener('click', () => {
        appendNumber(button.dataset.number);
      });
    });

    // Operation buttons
    document.querySelectorAll('[data-operation]').forEach(button => {
      button.addEventListener('click', () => {
        chooseOperation(button.dataset.operation);
      });
    });

    // Action buttons
    document.querySelector('[data-action="clear"]').addEventListener('click', clear);
    document.querySelector('[data-action="delete"]').addEventListener('click', deleteNumber);
    document.querySelector('[data-action="equals"]').addEventListener('click', compute);

    function appendNumber(number) {
      if (shouldResetScreen) {
        currentOperand = '0';
        shouldResetScreen = false;
      }
      if (number === '.' && currentOperand.includes('.')) return;
      if (currentOperand === '0' && number !== '.') {
        currentOperand = number;
      } else {
        currentOperand = currentOperand + number;
      }
      updateDisplay();
    }

    function chooseOperation(op) {
      if (currentOperand === '') return;
      if (previousOperand !== '') {
        compute();
      }
      operation = op;
      previousOperand = currentOperand;
      shouldResetScreen = true;
      updateDisplay();
    }

    function compute() {
      let computation;
      const prev = parseFloat(previousOperand);
      const current = parseFloat(currentOperand);
      if (isNaN(prev) || isNaN(current)) return;

      switch (operation) {
        case '+':
          computation = prev + current;
          break;
        case '-':
          computation = prev - current;
          break;
        case '×':
          computation = prev * current;
          break;
        case '÷':
          computation = prev / current;
          break;
        default:
          return;
      }

      currentOperand = computation.toString();
      operation = null;
      previousOperand = '';
      shouldResetScreen = true;
      updateDisplay();
    }

    function clear() {
      currentOperand = '0';
      previousOperand = '';
      operation = null;
      updateDisplay();
    }

    function deleteNumber() {
      if (currentOperand.length === 1) {
        currentOperand = '0';
      } else {
        currentOperand = currentOperand.slice(0, -1);
      }
      updateDisplay();
    }

    function formatRupiah(number) {
      // Convert to string and split by decimal point
      const parts = number.toString().split('.');
      const integerPart = parts[0];
      const decimalPart = parts[1];
      
      // Format integer part with dots as thousand separators
      const formattedInteger = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      
      // Return with decimal part if exists
      if (decimalPart) {
        return `${formattedInteger},${decimalPart}`;
      }
      return formattedInteger;
    }

    function updateDisplay() {
      currentOperandElement.textContent = formatRupiah(currentOperand);
      if (operation != null) {
        previousOperandElement.textContent = `${formatRupiah(previousOperand)} ${operation}`;
      } else {
        previousOperandElement.textContent = '';
      }
    }

    // Element SDK implementation
    async function onConfigChange(config) {
      const title = config.calculator_title || defaultConfig.calculator_title;
      const backgroundColor = config.background_color || defaultConfig.background_color;
      const surfaceColor = config.surface_color || defaultConfig.surface_color;
      const textColor = config.text_color || defaultConfig.text_color;
      const operatorColor = config.operator_color || defaultConfig.operator_color;
      const accentColor = config.accent_color || defaultConfig.accent_color;

      // Update title
      document.getElementById('calculator-title').textContent = title;
      document.getElementById('calculator-title').style.color = textColor;

      // Update background
      document.body.style.background = backgroundColor;

      // Update surface
      const surface = document.querySelector('main > div');
      surface.style.background = `rgba(${parseInt(surfaceColor.slice(1,3), 16)}, ${parseInt(surfaceColor.slice(3,5), 16)}, ${parseInt(surfaceColor.slice(5,7), 16)}, 0.95)`;

      // Update display text
      currentOperandElement.style.color = textColor;
      previousOperandElement.style.color = `${textColor}66`;

      // Update number buttons
      document.querySelectorAll('.number-btn').forEach(btn => {
        btn.style.color = textColor;
      });

      // Update function buttons
      document.querySelectorAll('.function-btn').forEach(btn => {
        btn.style.color = accentColor;
      });

      // Update operator buttons
      document.querySelectorAll('.operator-btn').forEach(btn => {
        btn.style.color = operatorColor;
        btn.style.background = `${operatorColor}26`;
      });

      // Update equals button
      const equalsBtn = document.querySelector('.equals-btn');
      equalsBtn.style.background = `linear-gradient(135deg, ${operatorColor} 0%, ${accentColor} 100%)`;
      equalsBtn.style.color = textColor;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              if (window.elementSdk) {
                window.elementSdk.setConfig({ background_color: value });
              }
            }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (value) => {
              if (window.elementSdk) {
                window.elementSdk.setConfig({ surface_color: value });
              }
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              if (window.elementSdk) {
                window.elementSdk.setConfig({ text_color: value });
              }
            }
          },
          {
            get: () => config.operator_color || defaultConfig.operator_color,
            set: (value) => {
              if (window.elementSdk) {
                window.elementSdk.setConfig({ operator_color: value });
              }
            }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => {
              if (window.elementSdk) {
                window.elementSdk.setConfig({ accent_color: value });
              }
            }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['calculator_title', config.calculator_title || defaultConfig.calculator_title]
      ]);
    }

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
