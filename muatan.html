        body {
            box-sizing: border-box;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .copy-btn-mini:hover {
            transform: scale(1.1);
        }
        
        .copy-btn-mini:active {
            transform: scale(0.9);
        }
        
        .copy-btn-mini {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        /* Mobile responsive styles */
        @media (max-width: 768px) {
            .mobile-card {
                display: block;
                padding: 16px;
                border-bottom: 1px solid rgba(220, 38, 38, 0.2);
            }
            
            .mobile-card:hover {
                background-color: rgba(127, 29, 29, 0.3);
            }
            
            .mobile-row {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 8px;
            }
            
            .mobile-label {
                font-weight: 600;
                font-size: 0.75rem;
                opacity: 0.8;
                min-width: 100px;
            }
            
            .mobile-value {
                font-size: 0.875rem;
                text-align: right;
                flex: 1;
            }
            
            .desktop-table {
                display: table;
            }
            
            @media (max-width: 768px) {
                .desktop-table {
                    display: none;
                }
            }
        }
        
        .mobile-view {
            display: none;
        }
        
        @media (max-width: 768px) {
            .mobile-view {
                display: block;
            }
        }
    </style>

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function copyText(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast('Teks berhasil disalin!');
            } catch (err) {
                showToast('Gagal menyalin teks');
            }
            
            document.body.removeChild(textArea);
        }

            // Update total price display
            const formattedTotal = totalPrice.toLocaleString('id-ID');

                    copyText(this.getAttribute('data-text'));

            document.querySelectorAll('[data-kode]').forEach(kodeElement => {
                kodeElement.addEventListener('click', function() {
                    const kode = this.getAttribute('data-kode');
                    const item = data.find(d => d.kode === kode);
                    if (item) {
                        openModal(item);
                    }
                });
            });
