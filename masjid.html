<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buku Kas Masjid Al-Ikhlas</title>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/di8stbg60/image/upload/v1766404576/masjid-removebg-preview_sfk21b.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .slide-in {
      animation: slideIn 0.3s ease-out;
    }
    
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto"></div>
  <script>
    // LocalStorage key
    const STORAGE_KEY = 'masjid_kas_transaksi';
    const CONFIG_KEY = 'masjid_kas_config';

    const defaultConfig = {
      background_color: "#f0f9ff",
      card_color: "#ffffff",
      text_color: "#1e293b",
      primary_action_color: "#0ea5e9",
      secondary_action_color: "#64748b",
      nama_masjid: "Masjid Al-Ikhlas Wani Lumbumpetigo",
      lokasi_masjid: "Wani Lumbumpetigo",
      judul_buku_kas: "Buku Kas Pembangunan",
      teks_pemasukan: "Total Pemasukan",
      teks_pengeluaran: "Total Pengeluaran",
      teks_saldo: "Saldo Akhir",
      font_family: "system-ui",
      font_size: 16
    };

    let allTransaksi = [];
    let editingTransaction = null;
    let filterJenis = 'semua';
    let config = { ...defaultConfig };

    // Load data from localStorage
    function loadData() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          allTransaksi = JSON.parse(stored);
        }
        
        const storedConfig = localStorage.getItem(CONFIG_KEY);
        if (storedConfig) {
          config = { ...defaultConfig, ...JSON.parse(storedConfig) };
        }
      } catch (error) {
        console.error('Error loading data:', error);
        allTransaksi = [];
      }
    }

    // Save data to localStorage
    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allTransaksi));
      } catch (error) {
        showToast("Gagal menyimpan data. Storage mungkin penuh.", "error");
      }
    }

    // Save config to localStorage
    function saveConfig() {
      try {
        localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
      } catch (error) {
        console.error('Error saving config:', error);
      }
    }

    // Generate unique ID
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function initApp() {
      loadData();
      renderUI();
    }

    function renderUI() {
      const backgroundColor = config.background_color;
      const cardColor = config.card_color;
      const textColor = config.text_color;
      const primaryColor = config.primary_action_color;
      const secondaryColor = config.secondary_action_color;
      const fontFamily = config.font_family;
      const fontSize = config.font_size;
      
      const namaMasjid = config.nama_masjid;
      const lokasiMasjid = config.lokasi_masjid;
      const judulBukuKas = config.judul_buku_kas;
      const teksPemasukan = config.teks_pemasukan;
      const teksPengeluaran = config.teks_pengeluaran;
      const teksSaldo = config.teks_saldo;

      const filteredTransaksi = filterJenis === 'semua' 
        ? allTransaksi 
        : allTransaksi.filter(t => t.jenis === filterJenis);

      const totalPemasukan = allTransaksi
        .filter(t => t.jenis === 'pemasukan')
        .reduce((sum, t) => sum + t.jumlah, 0);
      
      const totalPengeluaran = allTransaksi
        .filter(t => t.jenis === 'pengeluaran')
        .reduce((sum, t) => sum + t.jumlah, 0);
      
      const saldo = totalPemasukan - totalPengeluaran;

      const app = document.getElementById('app');
      app.style.backgroundColor = backgroundColor;
      app.style.color = textColor;
      app.style.fontFamily = `${fontFamily}, system-ui, -apple-system, sans-serif`;
      
      app.innerHTML = `
        <div class="w-full min-h-full p-4 md:p-8">
          <div class="max-w-6xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-8">
              <img src="https://res.cloudinary.com/di8stbg60/image/upload/v1766404576/masjid-removebg-preview_sfk21b.png" alt="Logo Masjid" style="width: 80px; height: 80px; margin: 0 auto 16px auto; display: block;">
              <h1 class="font-bold mb-2" style="font-size: ${fontSize * 2}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                ${namaMasjid}
              </h1>
              <p class="mb-4" style="font-size: ${fontSize * 1.1}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                📍 ${lokasiMasjid}
              </p>
              <h2 class="font-semibold" style="font-size: ${fontSize * 1.5}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                ${judulBukuKas}
              </h2>
            </div>

            <!-- Summary Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
              <div class="rounded-lg p-6 shadow-md" style="background-color: ${cardColor};">
                <div class="flex items-center justify-between">
                  <div>
                    <p class="mb-1" style="font-size: ${fontSize * 0.85}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                      ${teksPemasukan}
                    </p>
                    <p class="font-bold" style="font-size: ${fontSize * 1.5}px; color: #10b981; font-family: ${fontFamily}, system-ui, sans-serif;">
                      Rp ${totalPemasukan.toLocaleString('id-ID')}
                    </p>
                  </div>
                  <div style="font-size: ${fontSize * 2}px;">💰</div>
                </div>
              </div>

              <div class="rounded-lg p-6 shadow-md" style="background-color: ${cardColor};">
                <div class="flex items-center justify-between">
                  <div>
                    <p class="mb-1" style="font-size: ${fontSize * 0.85}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                      ${teksPengeluaran}
                    </p>
                    <p class="font-bold" style="font-size: ${fontSize * 1.5}px; color: #ef4444; font-family: ${fontFamily}, system-ui, sans-serif;">
                      Rp ${totalPengeluaran.toLocaleString('id-ID')}
                    </p>
                  </div>
                  <div style="font-size: ${fontSize * 2}px;">📤</div>
                </div>
              </div>

              <div class="rounded-lg p-6 shadow-md" style="background-color: ${cardColor};">
                <div class="flex items-center justify-between">
                  <div>
                    <p class="mb-1" style="font-size: ${fontSize * 0.85}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                      ${teksSaldo}
                    </p>
                    <p class="font-bold" style="font-size: ${fontSize * 1.5}px; color: ${primaryColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                      Rp ${saldo.toLocaleString('id-ID')}
                    </p>
                  </div>
                  <div style="font-size: ${fontSize * 2}px;">💵</div>
                </div>
              </div>
            </div>

            <!-- Form Input -->
            <div class="rounded-lg p-6 mb-6 shadow-md" style="background-color: ${cardColor};">
              <h3 class="font-semibold mb-4" style="font-size: ${fontSize * 1.3}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                ${editingTransaction ? '✏️ Edit Transaksi' : '➕ Tambah Transaksi Baru'}
              </h3>
              <form id="transaksiForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label for="tanggal" class="block mb-2" style="font-size: ${fontSize * 0.9}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                    Tanggal
                  </label>
                  <input 
                    type="date" 
                    id="tanggal" 
                    required
                    class="w-full px-3 py-2 border rounded-lg" 
                    style="font-size: ${fontSize}px; font-family: ${fontFamily}, system-ui, sans-serif; border-color: ${secondaryColor};"
                  >
                </div>

                <div>
                  <label for="jenis" class="block mb-2" style="font-size: ${fontSize * 0.9}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                    Jenis
                  </label>
                  <select 
                    id="jenis" 
                    required
                    class="w-full px-3 py-2 border rounded-lg" 
                    style="font-size: ${fontSize}px; font-family: ${fontFamily}, system-ui, sans-serif; border-color: ${secondaryColor};"
                  >
                    <option value="pemasukan">Pemasukan</option>
                    <option value="pengeluaran">Pengeluaran</option>
                  </select>
                </div>

                <div>
                  <label for="kategori" class="block mb-2" style="font-size: ${fontSize * 0.9}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                    Kategori
                  </label>
                  <select 
                    id="kategori" 
                    required
                    class="w-full px-3 py-2 border rounded-lg" 
                    style="font-size: ${fontSize}px; font-family: ${fontFamily}, system-ui, sans-serif; border-color: ${secondaryColor};"
                  >
                    <option value="donasi">Donasi</option>
                    <option value="infaq">Infaq</option>
                    <option value="sedekah">Sedekah</option>
                    <option value="material">Material Bangunan</option>
                    <option value="upah">Upah Pekerja</option>
                    <option value="lainnya">Lainnya</option>
                  </select>
                </div>

                <div>
                  <label for="nama_donatur" class="block mb-2" style="font-size: ${fontSize * 0.9}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                    Nama Donatur/Penerima
                  </label>
                  <input 
                    type="text" 
                    id="nama_donatur" 
                    placeholder="Nama (opsional)"
                    class="w-full px-3 py-2 border rounded-lg" 
                    style="font-size: ${fontSize}px; font-family: ${fontFamily}, system-ui, sans-serif; border-color: ${secondaryColor};"
                  >
                </div>

                <div>
                  <label for="jumlah" class="block mb-2" style="font-size: ${fontSize * 0.9}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                    Jumlah (Rp)
                  </label>
                  <input 
                    type="number" 
                    id="jumlah" 
                    required
                    min="0"
                    placeholder="0"
                    class="w-full px-3 py-2 border rounded-lg" 
                    style="font-size: ${fontSize}px; font-family: ${fontFamily}, system-ui, sans-serif; border-color: ${secondaryColor};"
                  >
                </div>

                <div>
                  <label for="keterangan" class="block mb-2" style="font-size: ${fontSize * 0.9}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                    Keterangan
                  </label>
                  <input 
                    type="text" 
                    id="keterangan" 
                    required
                    placeholder="Deskripsi transaksi"
                    class="w-full px-3 py-2 border rounded-lg" 
                    style="font-size: ${fontSize}px; font-family: ${fontFamily}, system-ui, sans-serif; border-color: ${secondaryColor};"
                  >
                </div>

                <div class="md:col-span-2 flex gap-2">
                  <button 
                    type="submit" 
                    id="submitBtn"
                    class="flex-1 py-3 px-6 rounded-lg font-semibold transition-all shadow-md"
                    style="background-color: ${primaryColor}; color: white; font-size: ${fontSize}px; font-family: ${fontFamily}, system-ui, sans-serif;"
                  >
                    ${editingTransaction ? '💾 Update' : '➕ Tambah'}
                  </button>
                  ${editingTransaction ? `
                    <button 
                      type="button" 
                      id="cancelBtn"
                      class="py-3 px-6 rounded-lg font-semibold transition-all shadow-md"
                      style="background-color: ${secondaryColor}; color: white; font-size: ${fontSize}px; font-family: ${fontFamily}, system-ui, sans-serif;"
                    >
                      ❌ Batal
                    </button>
                  ` : ''}
                </div>
              </form>
            </div>

            <!-- Filter & Actions -->
            <div class="flex flex-col md:flex-row gap-2 mb-4 justify-between items-start md:items-center">
              <div class="flex gap-2 flex-wrap">
                <button 
                  onclick="window.setFilter('semua')"
                  class="py-2 px-4 rounded-lg font-semibold transition-all shadow-sm"
                  style="background-color: ${filterJenis === 'semua' ? primaryColor : cardColor}; color: ${filterJenis === 'semua' ? 'white' : textColor}; font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif; border: 2px solid ${filterJenis === 'semua' ? primaryColor : secondaryColor};"
                >
                  📊 Semua (${allTransaksi.length})
                </button>
                <button 
                  onclick="window.setFilter('pemasukan')"
                  class="py-2 px-4 rounded-lg font-semibold transition-all shadow-sm"
                  style="background-color: ${filterJenis === 'pemasukan' ? primaryColor : cardColor}; color: ${filterJenis === 'pemasukan' ? 'white' : textColor}; font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif; border: 2px solid ${filterJenis === 'pemasukan' ? primaryColor : secondaryColor};"
                >
                  💰 Pemasukan (${allTransaksi.filter(t => t.jenis === 'pemasukan').length})
                </button>
                <button 
                  onclick="window.setFilter('pengeluaran')"
                  class="py-2 px-4 rounded-lg font-semibold transition-all shadow-sm"
                  style="background-color: ${filterJenis === 'pengeluaran' ? primaryColor : cardColor}; color: ${filterJenis === 'pengeluaran' ? 'white' : textColor}; font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif; border: 2px solid ${filterJenis === 'pengeluaran' ? primaryColor : secondaryColor};"
                >
                  📤 Pengeluaran (${allTransaksi.filter(t => t.jenis === 'pengeluaran').length})
                </button>
              </div>
              
              <div class="flex gap-2 w-full md:w-auto flex-wrap">
                <button 
                  onclick="window.downloadLaporan()"
                  class="flex-1 md:flex-none py-2 px-4 rounded-lg font-semibold transition-all shadow-md"
                  style="background-color: #10b981; color: white; font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;"
                >
                  📥 Laporan
                </button>
                <button 
                  onclick="window.printLaporan()"
                  class="flex-1 md:flex-none py-2 px-4 rounded-lg font-semibold transition-all shadow-md"
                  style="background-color: #3b82f6; color: white; font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;"
                >
                  🖨️ Cetak
                </button>
                <button 
                  onclick="window.shareToWhatsApp()"
                  class="flex-1 md:flex-none py-2 px-4 rounded-lg font-semibold transition-all shadow-md"
                  style="background-color: #25D366; color: white; font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;"
                >
                  📱 WhatsApp
                </button>
                <button 
                  onclick="window.backupData()"
                  class="flex-1 md:flex-none py-2 px-4 rounded-lg font-semibold transition-all shadow-md"
                  style="background-color: #8b5cf6; color: white; font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;"
                >
                  💾 Backup
                </button>
                <button 
                  onclick="window.restoreData()"
                  class="flex-1 md:flex-none py-2 px-4 rounded-lg font-semibold transition-all shadow-md"
                  style="background-color: #f59e0b; color: white; font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;"
                >
                  📤 Restore
                </button>
              </div>
            </div>

            <!-- Tabel Transaksi - Desktop -->
            <div class="hidden md:block rounded-lg shadow-md overflow-hidden" style="background-color: ${cardColor};">
              <div class="overflow-x-auto">
                <table class="w-full">
                  <thead style="background-color: ${primaryColor};">
                    <tr>
                      <th class="px-4 py-3 text-left text-white" style="font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;">Tanggal</th>
                      <th class="px-4 py-3 text-left text-white" style="font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;">Jenis</th>
                      <th class="px-4 py-3 text-left text-white" style="font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;">Kategori</th>
                      <th class="px-4 py-3 text-left text-white" style="font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;">Nama</th>
                      <th class="px-4 py-3 text-left text-white" style="font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;">Keterangan</th>
                      <th class="px-4 py-3 text-right text-white" style="font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;">Jumlah</th>
                      <th class="px-4 py-3 text-center text-white" style="font-size: ${fontSize * 0.9}px; font-family: ${fontFamily}, system-ui, sans-serif;">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="transaksiList">
                    ${filteredTransaksi.length === 0 ? `
                      <tr>
                        <td colspan="7" class="px-4 py-8 text-center" style="font-size: ${fontSize}px; color: ${secondaryColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                          📝 Belum ada transaksi. Tambahkan transaksi pertama Anda!
                        </td>
                      </tr>
                    ` : filteredTransaksi.map((t, index) => `
                      <tr class="border-b" style="border-color: ${secondaryColor}30;" data-id="${t.id}">
                        <td class="px-4 py-3" style="font-size: ${fontSize * 0.85}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                          ${new Date(t.tanggal).toLocaleDateString('id-ID')}
                        </td>
                        <td class="px-4 py-3" style="font-size: ${fontSize * 0.85}px; font-family: ${fontFamily}, system-ui, sans-serif;">
                          <span class="px-2 py-1 rounded-full text-white" style="background-color: ${t.jenis === 'pemasukan' ? '#10b981' : '#ef4444'};">
                            ${t.jenis === 'pemasukan' ? '💰' : '📤'} ${t.jenis}
                          </span>
                        </td>
                        <td class="px-4 py-3" style="font-size: ${fontSize * 0.85}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                          ${t.kategori}
                        </td>
                        <td class="px-4 py-3" style="font-size: ${fontSize * 0.85}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                          ${t.nama_donatur || '-'}
                        </td>
                        <td class="px-4 py-3" style="font-size: ${fontSize * 0.85}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                          ${t.keterangan}
                        </td>
                        <td class="px-4 py-3 text-right font-semibold" style="font-size: ${fontSize * 0.9}px; color: ${t.jenis === 'pemasukan' ? '#10b981' : '#ef4444'}; font-family: ${fontFamily}, system-ui, sans-serif;">
                          Rp ${t.jumlah.toLocaleString('id-ID')}
                        </td>
                        <td class="px-4 py-3 text-center">
                          <div class="flex gap-2 justify-center">
                            <button 
                              onclick="window.editTransaksi('${t.id}')"
                              class="py-1 px-3 rounded transition-all"
                              style="background-color: ${primaryColor}; color: white; font-size: ${fontSize * 0.8}px; font-family: ${fontFamily}, system-ui, sans-serif;"
                            >
                              ✏️ Edit
                            </button>
                            <button 
                              onclick="window.deleteTransaksi('${t.id}')"
                              class="py-1 px-3 rounded transition-all"
                              style="background-color: #ef4444; color: white; font-size: ${fontSize * 0.8}px; font-family: ${fontFamily}, system-ui, sans-serif;"
                            >
                              🗑️ Hapus
                            </button>
                          </div>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>

            <!-- Card View - Mobile -->
            <div class="md:hidden space-y-4">
              ${filteredTransaksi.length === 0 ? `
                <div class="rounded-lg p-8 text-center shadow-md" style="background-color: ${cardColor};">
                  <p style="font-size: ${fontSize}px; color: ${secondaryColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                    📝 Belum ada transaksi. Tambahkan transaksi pertama Anda!
                  </p>
                </div>
              ` : filteredTransaksi.map(t => `
                <div class="rounded-lg p-4 shadow-md" style="background-color: ${cardColor}; border-left: 4px solid ${t.jenis === 'pemasukan' ? '#10b981' : '#ef4444'};" data-id="${t.id}">
                  <div class="flex justify-between items-start mb-3">
                    <div>
                      <span class="px-3 py-1 rounded-full text-white inline-block" style="background-color: ${t.jenis === 'pemasukan' ? '#10b981' : '#ef4444'}; font-size: ${fontSize * 0.8}px; font-family: ${fontFamily}, system-ui, sans-serif;">
                        ${t.jenis === 'pemasukan' ? '💰' : '📤'} ${t.jenis}
                      </span>
                      <p class="mt-2" style="font-size: ${fontSize * 0.75}px; color: ${secondaryColor}; font-family: ${fontFamily}, system-ui, sans-serif;">
                        📅 ${new Date(t.tanggal).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}
                      </p>
                    </div>
                    <p class="font-bold text-right" style="font-size: ${fontSize * 1.1}px; color: ${t.jenis === 'pemasukan' ? '#10b981' : '#ef4444'}; font-family: ${fontFamily}, system-ui, sans-serif;">
                      Rp ${t.jumlah.toLocaleString('id-ID')}
                    </p>
                  </div>
                  
                  <div class="space-y-2 mb-3">
                    <div class="flex items-start">
                      <span style="font-size: ${fontSize * 0.8}px; color: ${secondaryColor}; font-family: ${fontFamily}, system-ui, sans-serif; min-width: 80px;">📂 Kategori:</span>
                      <span style="font-size: ${fontSize * 0.85}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif; font-weight: 500;">${t.kategori}</span>
                    </div>
                    ${t.nama_donatur ? `
                      <div class="flex items-start">
                        <span style="font-size: ${fontSize * 0.8}px; color: ${secondaryColor}; font-family: ${fontFamily}, system-ui, sans-serif; min-width: 80px;">👤 Nama:</span>
                        <span style="font-size: ${fontSize * 0.85}px; color: ${textColor}; font-family: ${fontFamily}, system-ui, sans-serif;">${t.nama_donatur}</span>
                      </div>
                    ` : ''}
                    <div class="flex items-start">

    function handleSubmit(e) {
      e.preventDefault();

      const formData = {
        id: editingTransaction ? editingTransaction.id : generateId(),
        tanggal: document.getElementById('tanggal').value,
        jenis: document.getElementById('jenis').value,
        kategori: document.getElementById('kategori').value,
        nama_donatur: document.getElementById('nama_donatur').value,
        jumlah: parseFloat(document.getElementById('jumlah').value),
        keterangan: document.getElementById('keterangan').value,
        createdAt: editingTransaction ? editingTransaction.createdAt : new Date().toISOString()
      };

      if (editingTransaction) {
        const index = allTransaksi.findIndex(t => t.id === editingTransaction.id);
        if (index !== -1) {
          allTransaksi[index] = formData;
          showToast("Transaksi berhasil diupdate! ✅", "success");
          editingTransaction = null;
        }
      } else {
        allTransaksi.unshift(formData);
        showToast("Transaksi berhasil ditambahkan! ✅", "success");
        document.getElementById('transaksiForm').reset();
        document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];
      }

      saveData();
      renderUI();
    }

    window.editTransaksi = (id) => {
      editingTransaction = allTransaksi.find(t => t.id === id);
      if (editingTransaction) {
        renderUI();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    };

    window.deleteTransaksi = (id) => {
      const transaksi = allTransaksi.find(t => t.id === id);
      if (!transaksi) return;

      const confirmMsg = document.createElement('div');
      confirmMsg.className = 'toast';
      confirmMsg.innerHTML = `
        <div class="rounded-lg px-6 py-4 shadow-lg" style="background-color: #f59e0b; color: white; font-size: ${config.font_size}px;">
          <p class="mb-3">Yakin hapus transaksi ini?</p>
          <div class="flex gap-2">
            <button id="confirmDelete" class="px-4 py-2 bg-red-600 rounded font-semibold">Ya, Hapus</button>
            <button id="cancelDelete" class="px-4 py-2 bg-gray-600 rounded font-semibold">Batal</button>
          </div>
        </div>
      `;
      
      document.body.appendChild(confirmMsg);
      
      document.getElementById('confirmDelete').onclick = () => {
        allTransaksi = allTransaksi.filter(t => t.id !== id);
        saveData();
        renderUI();
        showToast("Transaksi berhasil dihapus! 🗑️", "success");
        confirmMsg.remove();
      };
      
      document.getElementById('cancelDelete').onclick = () => {
        confirmMsg.remove();
      };
      
      setTimeout(() => {
        if (document.body.contains(confirmMsg)) {
          confirmMsg.remove();
        }
      }, 5000);
    };

    window.backupData = () => {
      const backupData = {
        transaksi: allTransaksi,
        config: config,
        backupDate: new Date().toISOString(),
        version: "1.0"
      };
      
      const dataStr = JSON.stringify(backupData, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      
      const fileName = 'Backup_BukuKas_' + config.nama_masjid.replace(/\s+/g, '_') + '_' + new Date().toISOString().split('T')[0] + '.json';
      a.download = fileName;
      
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showToast("Backup berhasil diunduh! 💾", "success");
    };

    window.restoreData = () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const backupData = JSON.parse(event.target.result);
            
            if (backupData.transaksi && Array.isArray(backupData.transaksi)) {
              allTransaksi = backupData.transaksi;
              
              if (backupData.config) {
                config = { ...defaultConfig, ...backupData.config };
                saveConfig();
              }
              
              saveData();
              renderUI();
              showToast("Data berhasil dipulihkan! 📤 Total: " + allTransaksi.length + " transaksi", "success");
            } else {
              showToast("Format file backup tidak valid!", "error");
            }
          } catch (error) {
            showToast("Gagal membaca file backup!", "error");
          }
        };
        
        reader.readAsText(file);
      };
      
      input.click();
    };

            '<td>' + new Date(t.tanggal).toLocaleDateString('id-ID') + '</td>' +
            '<td><span class="jenis-badge jenis-' + t.jenis + '">' + t.jenis + '</span></td>' +
            '<td>' + t.kategori + '</td>' +
            '<td>' + (t.nama_donatur || '-') + '</td>' +
            '<td>' + t.keterangan + '</td>' +
            '<td style="text-align: right;" class="text-' + t.jenis + '">Rp ' + t.jumlah.toLocaleString('id-ID') + '</td>' +
            '</tr>'
          ).join('')
        ) +
'      </tbody>' +
'    </table>' +
'    <div class="footer">' +
'      <p>💚 Semoga pembangunan masjid ini mendapat berkah dari Allah SWT 💚</p>' +
'    </div>' +
'  </div>' +
'</body>' +
'</html>';

      const blob = new Blob([htmlContent], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Laporan_' + namaMasjid.replace(/\s+/g, '_') + '_' + new Date().toISOString().split('T')[0] + '.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showToast("Laporan berhasil diunduh! 📥", "success");
    };

    function showToast(message, type) {
      const backgroundColor = type === 'success' ? '#10b981' : '#ef4444';
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <div class="rounded-lg px-6 py-4 shadow-lg" style="background-color: ${backgroundColor}; color: white; font-size: ${config.font_size}px;">
          ${message}
        </div>
      `;
      
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    initApp();
