<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday SYAM DIGITAL ke-51!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=Dancing+Script:wght@400;700&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
    }
    
    .font-playfair {
      font-family: 'Playfair Display', serif;
    }
    
    .font-dancing {
      font-family: 'Dancing Script', cursive;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    
    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(800px) rotate(720deg); opacity: 0; }
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
      50% { filter: drop-shadow(0 0 25px rgba(255,255,255,0.9)); }
    }
    
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes wave {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(10deg); }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    
    .confetti {
      position: absolute;
      width: 12px;
      height: 12px;
      animation: confetti-fall linear forwards;
    }
    
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
    
    .sparkle {
      animation: sparkle 1.5s ease-in-out infinite;
    }
    
    .pulse-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }
    
    .bounce-in {
      animation: bounce-in 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }
    
    .wave-animation {
      animation: wave 0.5s ease-in-out;
      transform-origin: 70% 70%;
    }
    
    .shimmer-text {
      background: linear-gradient(90deg, #fff 0%, #ffd700 25%, #fff 50%, #ffd700 75%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    
    .card-container {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 30%, #f093fb 70%, #f5576c 100%);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .interactive-btn {
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .interactive-btn:hover {
      transform: scale(1.1);
    }
    
    .interactive-btn:active {
      transform: scale(0.95);
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>

    <div class="flex justify-center items-center gap-3 mb-6"><span class="text-6xl md:text-7xl font-bold text-yellow-300 font-playfair drop-shadow-lg">51</span> <span class="text-white/90 text-xl font-dancing">tahun</span>

    <div class="flex justify-center gap-4 flex-wrap"><button onclick="sendLove()" class="interactive-btn bg-white/20 hover:bg-white/30 text-white px-6 py-3 rounded-full font-playfair flex items-center gap-2 border border-white/30"> <span id="heart-icon">❤️</span> <span>Kirim Cinta</span> </button> <button onclick="makeWish()" class="interactive-btn bg-white/20 hover:bg-white/30 text-white px-6 py-3 rounded-full font-playfair flex items-center gap-2 border border-white/30"> <span>🌠</span> <span>Buat Harapan</span> </button> <button onclick="shareToWhatsApp()" class="interactive-btn bg-green-500/80 hover:bg-green-500 text-white px-6 py-3 rounded-full font-playfair flex items-center gap-2 border border-green-400/50">
      <svg class="w-5 h-5" viewbox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />

  <script>
    const defaultConfig = {
      recipient_name: "SYAM DIGITAL",
      age: "51",
      date: "05 Januari 2026",
      main_message: "Happy Birthday!",
      sub_message: "Semoga semua impian dan harapanmu menjadi kenyataan di tahun yang indah ini! 🌟",
      background_color: "#667eea",
      accent_color: "#f5576c",
      text_color: "#ffffff",
      font_family: "Playfair Display",
      font_size: 16
    };
    
    let config = { ...defaultConfig };
    let loveCount = 0;
    
    // Element SDK initialization
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (newConfig) => {
          config = { ...defaultConfig, ...newConfig };
          updateUI();
        },
        mapToCapabilities: (cfg) => ({
          recolorables: [
            {
              get: () => cfg.background_color || defaultConfig.background_color,
              set: (value) => {
                config.background_color = value;
                window.elementSdk.setConfig({ background_color: value });
              }
            },
            {
              get: () => cfg.accent_color || defaultConfig.accent_color,
              set: (value) => {
                config.accent_color = value;
                window.elementSdk.setConfig({ accent_color: value });
              }
            },
            {
              get: () => cfg.text_color || defaultConfig.text_color,
              set: (value) => {
                config.text_color = value;
                window.elementSdk.setConfig({ text_color: value });
              }
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => cfg.font_family || defaultConfig.font_family,
            set: (value) => {
              config.font_family = value;
              window.elementSdk.setConfig({ font_family: value });
            }
          },
          fontSizeable: {
            get: () => cfg.font_size || defaultConfig.font_size,
            set: (value) => {
              config.font_size = value;
              window.elementSdk.setConfig({ font_size: value });
            }
          }
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ["recipient_name", cfg.recipient_name || defaultConfig.recipient_name],
          ["main_message", cfg.main_message || defaultConfig.main_message],
          ["sub_message", cfg.sub_message || defaultConfig.sub_message]
        ])
      });
    }
    
    function updateUI() {
      const nameEl = document.getElementById('recipient-name');
      const mainMsgEl = document.getElementById('main-greeting');
      const subMsgEl = document.getElementById('sub-message');
      const wrapper = document.getElementById('card-wrapper');
      
      if (nameEl) nameEl.textContent = config.recipient_name || defaultConfig.recipient_name;
      if (mainMsgEl) mainMsgEl.textContent = config.main_message || defaultConfig.main_message;
      if (subMsgEl) subMsgEl.textContent = config.sub_message || defaultConfig.sub_message;
      
      // Update colors
      const bgColor = config.background_color || defaultConfig.background_color;
      const accentColor = config.accent_color || defaultConfig.accent_color;
      if (wrapper) {
        wrapper.style.background = `linear-gradient(135deg, ${bgColor} 0%, #764ba2 30%, #f093fb 70%, ${accentColor} 100%)`;
      }
      
      // Update text color
      const textColor = config.text_color || defaultConfig.text_color;
      if (nameEl) nameEl.style.color = textColor;
      if (subMsgEl) subMsgEl.style.color = textColor;
      
      // Update font
      const fontFamily = config.font_family || defaultConfig.font_family;
      const baseSize = config.font_size || defaultConfig.font_size;
      
      if (nameEl) {
        nameEl.style.fontFamily = `${fontFamily}, serif`;
        nameEl.style.fontSize = `${baseSize * 2.5}px`;
      }
      if (subMsgEl) {
        subMsgEl.style.fontFamily = `${fontFamily}, serif`;
        subMsgEl.style.fontSize = `${baseSize * 1.25}px`;
      }
    }
    
    function createConfetti() {
      const container = document.getElementById('confetti-container');
      const colors = ['#FFD700', '#FF69B4', '#00CED1', '#FF6347', '#9370DB', '#32CD32', '#FF1493', '#00FA9A'];
      const shapes = ['circle', 'square', 'triangle'];
      
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + '%';
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
          confetti.style.animationDelay = Math.random() * 0.5 + 's';
          
          const shape = shapes[Math.floor(Math.random() * shapes.length)];
          if (shape === 'circle') {
            confetti.style.borderRadius = '50%';
          } else if (shape === 'triangle') {
            confetti.style.width = '0';
            confetti.style.height = '0';
            confetti.style.backgroundColor = 'transparent';
            confetti.style.borderLeft = '6px solid transparent';
            confetti.style.borderRight = '6px solid transparent';
            confetti.style.borderBottom = '12px solid ' + colors[Math.floor(Math.random() * colors.length)];
          }
          
          container.appendChild(confetti);
          
          setTimeout(() => confetti.remove(), 5000);
        }, i * 50);
      }
    }
    
    function triggerCelebration() {
      createConfetti();
      
      const cake = document.getElementById('cake-container');
      cake.classList.add('wave-animation');
      setTimeout(() => cake.classList.remove('wave-animation'), 500);
      
      // Add floating emojis
      const emojis = ['🎉', '🎊', '🎈', '🎁', '🌟', '✨', '💫', '🎂'];
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          const emoji = document.createElement('div');
          emoji.textContent = emojis[i];
          emoji.style.cssText = `
            position: fixed;
            font-size: 2rem;
            left: ${Math.random() * 80 + 10}%;
            top: 100%;
            animation: confetti-fall 3s ease-out forwards;
            pointer-events: none;
            z-index: 100;
          `;
          document.body.appendChild(emoji);
          setTimeout(() => emoji.remove(), 3000);
        }, i * 100);
      }
    }
    
    function sendLove() {
      loveCount++;
      const counter = document.getElementById('love-counter');
      const countEl = document.getElementById('love-count');
      const heartIcon = document.getElementById('heart-icon');
      
      counter.classList.remove('hidden');
      countEl.textContent = loveCount;
      
      // Heart animation
      heartIcon.style.transform = 'scale(1.5)';
      setTimeout(() => heartIcon.style.transform = 'scale(1)', 200);
      
      // Create floating hearts
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          const heart = document.createElement('div');
          heart.textContent = '💕';
          heart.style.cssText = `
            position: fixed;
            font-size: 1.5rem;
            left: ${50 + (Math.random() - 0.5) * 30}%;
            bottom: 30%;
            animation: confetti-fall 2s ease-out reverse forwards;
            pointer-events: none;
            z-index: 100;
          `;
          document.body.appendChild(heart);
          setTimeout(() => heart.remove(), 2000);
        }, i * 100);
      }
    }
    
    function makeWish() {
      const wishDisplay = document.getElementById('wish-display');
      wishDisplay.classList.remove('hidden');
      
      // Create shooting stars
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          const star = document.createElement('div');
          star.textContent = '⭐';
          star.style.cssText = `
            position: fixed;
            font-size: 1.5rem;
            right: 0;
            top: ${20 + i * 15}%;
            animation: confetti-fall 1.5s linear forwards;
            transform: rotate(-45deg);
            pointer-events: none;
            z-index: 100;
          `;
          document.body.appendChild(star);
          setTimeout(() => star.remove(), 1500);
        }, i * 300);
      }
      
      setTimeout(() => wishDisplay.classList.add('hidden'), 3000);
    }
    
    function shareToWhatsApp() {
      const name = config.recipient_name || defaultConfig.recipient_name;
      const message = `🎂✨ *Selamat Ulang Tahun ke-51, ${name}!* ✨🎂\n\n${config.sub_message || defaultConfig.sub_message}\n\n📅 05 Januari 2026\n\n🎉 Kirim ucapan dan cinta untukmu! 💕`;
      const encodedMessage = encodeURIComponent(message);
      window.open(`https://wa.me/?text=${encodedMessage}`, '_blank');
    }
    
    // Initial confetti burst
    setTimeout(createConfetti, 500);
    
    // Initial UI update
    updateUI();
  </script>
