<div class="section">
  <h2>Form Pemesanan</h2>

  <form onsubmit="kirimWA(); return false;" style="max-width:400px; margin:auto;">
    
    <input type="text" id="nama" placeholder="Nama Lengkap" required
    style="width:100%; padding:10px; margin:8px 0;">

    <input type="text" id="alamat" placeholder="Alamat Lengkap" required
    style="width:100%; padding:10px; margin:8px 0;">

    <input type="text" id="hp" placeholder="No HP / WhatsApp" required
    style="width:100%; padding:10px; margin:8px 0;">

    <!-- PRODUK -->
    <select id="produk" onchange="updateHarga()" required
    style="width:100%; padding:10px; margin:8px 0;">
      <option value="">Pilih Produk</option>
      <option value="Brilly Bar|35000">Brilly Bar - 35.000</option>
      <option value="Perkakas Set|85000">Set Perkakas - 85.000</option>
    </select>

    <!-- UKURAN -->
    <select id="ukuran" onchange="updateHarga()" required
    style="width:100%; padding:10px; margin:8px 0;">
      <option value="">Pilih Ukuran</option>
      <option value="Kecil|45500">Kecil - 45.500</option>
      <option value="Sedang|56500">Sedang - 56.500</option>
      <option value="Besar|67500">Besar - 67.500</option>
      <option value="Jumbo|78500">Jumbo - 78.500</option>
    </select>

    <input type="number" id="jumlah" placeholder="Jumlah" onchange="updateHarga()" required
    style="width:100%; padding:10px; margin:8px 0;">

    <!-- TOTAL -->
    <input type="text" id="total" placeholder="Total Harga" readonly
    style="width:100%; padding:10px; margin:8px 0; background:#eee;">

    <textarea id="catatan" placeholder="Catatan (opsional)"
    style="width:100%; padding:10px; margin:8px 0;"></textarea>

    <button type="submit"
    style="width:100%; padding:12px; background:#25D366; color:#fff; border:none; border-radius:8px; font-weight:bold;">
      🛒 Kirim Pesanan
    </button>

  </form>
</div>

<script>
function updateHarga() {
  let produk = document.getElementById("produk").value;
  let ukuran = document.getElementById("ukuran").value;
  let jumlah = document.getElementById("jumlah").value;

  let hargaProduk = produk ? parseInt(produk.split("|")[1]) : 0;
  let hargaUkuran = ukuran ? parseInt(ukuran.split("|")[1]) : 0;

  let total = (hargaProduk + hargaUkuran) * (jumlah || 1);

  document.getElementById("total").value = "Rp " + total.toLocaleString();
}

function kirimWA() {
  let nama = document.getElementById("nama").value;
  let alamat = document.getElementById("alamat").value;
  let hp = document.getElementById("hp").value;
  let produk = document.getElementById("produk").value.split("|")[0];
  let ukuran = document.getElementById("ukuran").value.split("|")[0];
  let jumlah = document.getElementById("jumlah").value;
  let total = document.getElementById("total").value;
  let catatan = document.getElementById("catatan").value;

  let pesan = `Halo, saya mau order:%0A%0A
Nama: ${nama}%0A
Alamat: ${alamat}%0A
No HP: ${hp}%0A
Produk: ${produk}%0A
Ukuran: ${ukuran}%0A
Jumlah: ${jumlah}%0A
Total: ${total}%0A
Catatan: ${catatan}`;

  window.open(`https://wa.me/6285150531572?text=${pesan}`, '_blank');
}
</script>
