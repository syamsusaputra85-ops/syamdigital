<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bukti Setoran Pajak - Kabupaten Donggala</title>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/di8stbg60/image/upload/v1763356194/Lambang_Kabupaten_Donggala_1_cvywgs.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      width: 100%;
      background-color: #f0f4f8;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    
    html {
      height: 100%;
      width: 100%;
    }
    
    .receipt-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      background-color: #ffffff;
    }
    
    .receipt-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }
    
    .modal-backdrop {
      backdrop-filter: blur(8px);
      animation: fadeIn 0.3s ease;
    }
    
    .modal-content {
      animation: slideUp 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .receipt-image {
      object-fit: cover;
      width: 100%;
      height: 100%;
    }
    
    .modal-image {
      max-height: 80vh;
      max-width: 90vw;
      object-fit: contain;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="w-full min-h-screen flex flex-col">
   <header class="w-full text-white py-12 px-6 text-center shadow-lg" style="background-color: #1e40af;">
    <div class="flex items-center justify-center mb-6"><img src="https://res.cloudinary.com/di8stbg60/image/upload/v1763356194/Lambang_Kabupaten_Donggala_1_cvywgs.png" alt="Logo Kabupaten Donggala" style="height: 100px; width: auto;" onerror="this.style.display='none';">
    </div>
    <h1 class="text-4xl font-bold mb-3 tracking-wide">BUKTI SETORAN PAJAK</h1>
    <h2 class="text-lg font-medium mb-4 opacity-95">KABUPATEN DONGGALA PROVINSI SULAWESI TENGAH</h2><span class="inline-block px-6 py-2 rounded-full font-semibold" style="background-color: #3b82f6;">TAHUN 2025</span>
   </header>
   <main class="flex-1 w-full px-6 py-12">
    <div class="max-w-7xl mx-auto">
     <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="receipts-container"><!-- Receipts will be loaded here -->
     </div>
    </div>
   </main>
   <footer class="w-full text-white py-6 px-6 text-center" style="background-color: #1e40af;">
    Dokumentasi Resmi Setoran Pajak Daerah
   </footer>
  </div><!-- Modal -->
  <div id="receipt-modal" class="modal-backdrop fixed inset-0 hidden items-center justify-center z-50" style="background-color: rgba(0, 0, 0, 0.75);">
   <div class="modal-content relative flex items-center justify-center p-8"><button id="close-modal" class="absolute top-4 right-4 text-white hover:text-gray-300 transition-colors z-10" style="font-size: 2rem; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;"> ✕ </button> <img id="modal-image" class="modal-image rounded-lg shadow-2xl" src="" alt="Bukti Setoran">
   </div>
  </div>
  <script>
    const receipts = [
      { id: 1, url: "https://res.cloudinary.com/di8stbg60/image/upload/v1764808619/bk2_ci7iyo.jpg", title: "Bukti Setoran 1" },
      { id: 2, url: "https://res.cloudinary.com/di8stbg60/image/upload/v1764808619/bk6_aclitt.jpg", title: "Bukti Setoran 2" },
      { id: 3, url: "https://res.cloudinary.com/di8stbg60/image/upload/v1764808616/bk3_mvxi4m.jpg", title: "Bukti Setoran 3" },
      { id: 4, url: "https://res.cloudinary.com/di8stbg60/image/upload/v1764808616/bh_ehwya4.jpg", title: "Bukti Setoran 4" },
      { id: 5, url: "https://res.cloudinary.com/di8stbg60/image/upload/v1764808615/bk5_mmoucq.jpg", title: "Bukti Setoran 5" },
      { id: 6, url: "https://res.cloudinary.com/di8stbg60/image/upload/v1764808616/bk4_r8mgtl.jpg", title: "Bukti Setoran 6" }
    ];

    function renderReceipts() {
      const container = document.getElementById('receipts-container');
      
      receipts.forEach((receipt, index) => {
        const card = document.createElement('div');
        card.className = 'receipt-card rounded-xl shadow-lg overflow-hidden';
        card.innerHTML = `
          <div class="aspect-[3/4] overflow-hidden" style="background-color: #e5e7eb;">
            <img 
              src="${receipt.url}" 
              alt="${receipt.title}"
              class="receipt-image"
              loading="lazy"
              crossorigin="anonymous"
            >
          </div>
          <div class="p-5">
            <h3 class="font-semibold mb-2 text-lg" style="color: #1f2937;">${receipt.title}</h3>
            <p class="font-medium" style="color: #3b82f6;">Dokumen #${String(index + 1).padStart(3, '0')}</p>
          </div>
        `;
        
        card.addEventListener('click', () => openModal(receipt));
        container.appendChild(card);
      });
    }

    function openModal(receipt) {
      const modal = document.getElementById('receipt-modal');
      const modalImage = document.getElementById('modal-image');
      modalImage.src = receipt.url;
      modalImage.alt = receipt.title;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('receipt-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    document.getElementById('close-modal').addEventListener('click', closeModal);
    document.getElementById('receipt-modal').addEventListener('click', (e) => {
      if (e.target.id === 'receipt-modal') closeModal();
    });

    // Render receipts when page loads
    document.addEventListener('DOMContentLoaded', renderReceipts);
  </script>

</html>
