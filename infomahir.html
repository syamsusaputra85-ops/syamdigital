  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 9999px;
      background: rgba(37, 211, 102, 0.3);
      animation: pulse-ring 2s ease-out infinite;
    }

 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto flex items-center justify-center p-6" style="background: linear-gradient(135deg, #0a1628 0%, #132744 50%, #0d2137 100%);">
   <main class="w-full max-w-md text-center"><!-- Icon -->
    <div class="float-anim mb-8 inline-block">
     <svg width="80" height="80" viewbox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="38" fill="#25D366" opacity="0.15" /> <circle cx="40" cy="40" r="28" fill="#25D366" opacity="0.25" /> <path d="M40 18C28.954 18 20 26.954 20 38c0 3.53.922 6.84 2.535 9.71L20 60l12.615-2.47A19.91 19.91 0 0040 58c11.046 0 20-8.954 20-20S51.046 18 40 18zm0 36.364a16.28 16.28 0 01-8.31-2.27l-.596-.354-6.18 1.62 1.65-6.03-.388-.617A16.24 16.24 0 0123.636 38c0-9.03 7.334-16.364 16.364-16.364S56.364 28.97 56.364 38 49.03 54.364 40 54.364zm8.97-12.24c-.492-.246-2.91-1.436-3.362-1.6-.452-.164-.78-.246-1.11.246-.328.492-1.272 1.6-1.56 1.928-.287.328-.574.37-1.066.124-.492-.246-2.077-.765-3.956-2.44-1.462-1.304-2.45-2.914-2.737-3.406-.287-.492-.03-.758.216-1.002.22-.22.492-.574.738-.862.246-.287.328-.492.492-.82.164-.328.082-.616-.04-.862-.124-.246-1.11-2.674-1.52-3.66-.4-.96-.808-.83-1.11-.846-.287-.014-.616-.018-.944-.018s-.862.124-1.314.616c-.452.492-1.724 1.682-1.724 4.106 0 2.424 1.764 4.764 2.01 5.092.246.328 3.47 5.296 8.408 7.426 1.175.508 2.093.81 2.808 1.038 1.18.374 2.253.322 3.102.195.946-.142 2.91-1.19 3.32-2.34.41-1.148.41-2.132.287-2.34-.124-.206-.452-.328-.944-.574z" fill="#25D366" />

    </div><!-- Heading -->
    <h1 id="heading" class="text-3xl font-extrabold text-white mb-3">Bagikan ke WhatsApp</h1>
    <p id="subtitle" class="text-slate-400 mb-10 text-base leading-relaxed">Kirim info lengkap tentang <span class="text-emerald-400 font-semibold">Mahir Digital</span> ke teman kamu lewat WhatsApp</p><!-- Button -->
    <div class="relative inline-block"><button id="shareBtn" onclick="shareWhatsApp()" class="pulse-ring relative bg-[#25D366] hover:bg-[#1ebe5a] active:scale-95 text-white font-bold text-lg px-10 py-4 rounded-full shadow-lg shadow-emerald-500/30 transition-all duration-200 flex items-center gap-3"> <i data-lucide="send" style="width:22px;height:22px;"></i> <span id="btnText">Bagikan ke WhatsApp</span> </button>
    </div><!-- Preview -->
    <details class="mt-10 text-left bg-white/5 backdrop-blur rounded-2xl border border-white/10 overflow-hidden"><summary class="px-5 py-4 text-slate-300 text-sm font-semibold cursor-pointer hover:bg-white/5 transition-colors flex items-center gap-2"> <i data-lucide="eye" style="width:16px;height:16px;"></i> Lihat preview pesan </summary>
     <div class="px-5 pb-5 text-slate-400 text-sm leading-relaxed whitespace-pre-line border-t border-white/10 pt-4" id="preview"></div>
    </details>
    <p class="mt-8 text-slate-500 text-xs">Klik tombol di atas untuk membuka WhatsApp</p>
   </main>
  </div>
  <script>
    const MESSAGE = `Halo! Tentu, ini info lebih lanjut tentang Mahir Digital:

Mahir Digital adalah platform belajar digital marketing paling lengkap yang dirancang khusus untuk pemula. Fokus utamanya adalah membantu kamu jualan online dan menghasilkan uang dari rumah dengan sistem #Ngajarin, #Nemenin, dan #Nolongin.

*Apa saja yang akan kamu dapatkan?*

✅ *Bimbingan Full Praktik:* Belajar mulai dari nol cara jualan di TikTok (Affiliate & Ads), Facebook Ads, Instagram Ads, hingga Google Ads.

✅ *Update Materi Rutin:* Akses ke 10+ E-Course eksklusif dan 6-12 kali Webinar setiap bulan agar kamu tidak ketinggalan tren terbaru.

✅ *Komunitas & Mentor:* Grup diskusi WhatsApp untuk tanya jawab langsung dengan mentor praktisi dan sesi kopdar rutin.

✅ *Siap Jualan:* Kamu akan dibantu disediakan produk yang lanjur dijual beserta konten iklannya, jadi tinggal gas!

*Sistem Membership:*
Cukup satu kali bayar untuk akses satu tahun penuh ke seluruh ekosistem, materi, dan bimbingan tanpa biaya tambahan tiap ada materi baru.

*Mau mulai belajar sekarang?*
Langsung saja daftar dan amankan slot kamu melalui link resmi member saya di bawah ini:

👉 *Daftar Mahir Digital Disini:*
https://member.mahirdigital.id/lp?aff=syamggih&i=1`;

    document.getElementById('preview').textContent = MESSAGE;

    function shareWhatsApp() {
      const encoded = encodeURIComponent(MESSAGE);
      window.open(`https://wa.me/?text=${encoded}`, '_blank');
    }

    const defaultConfig = {
      heading_text: 'Bagikan ke WhatsApp',
      button_text: 'Bagikan ke WhatsApp',
      bg_color: '#0a1628',
      accent_color: '#25D366',
      text_color: '#ffffff',
      font_family: 'Plus Jakarta Sans',
      font_size: 16
    };

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('heading').textContent = config.heading_text || defaultConfig.heading_text;
        document.getElementById('btnText').textContent = config.button_text || defaultConfig.button_text;

        const bg = config.bg_color || defaultConfig.bg_color;
        document.getElementById('app').style.background = `linear-gradient(135deg, ${bg} 0%, ${lighten(bg, 15)} 50%, ${bg} 100%)`;

        const accent = config.accent_color || defaultConfig.accent_color;
        document.getElementById('shareBtn').style.backgroundColor = accent;

        const textColor = config.text_color || defaultConfig.text_color;
        document.getElementById('heading').style.color = textColor;

        const font = config.font_family || defaultConfig.font_family;
        document.body.style.fontFamily = `${font}, Plus Jakarta Sans, sans-serif`;

        const size = config.font_size || defaultConfig.font_size;
        document.getElementById('heading').style.fontSize = `${size * 1.875}px`;
        document.getElementById('btnText').style.fontSize = `${size * 1.125}px`;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.bg_color || defaultConfig.bg_color, set: (v) => { config.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['heading_text', config.heading_text || defaultConfig.heading_text],
        ['button_text', config.button_text || defaultConfig.button_text]
      ])
    });

    function lighten(hex, pct) {
      const num = parseInt(hex.replace('#', ''), 16);
      const r = Math.min(255, (num >> 16) + pct);
      const g = Math.min(255, ((num >> 8) & 0xff) + pct);
      const b = Math.min(255, (num & 0xff) + pct);
      return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;
    }

    lucide.createIcons();
  </script>
