        let currentFilter = 'all';

        function renderVillages() {
            const villageList = document.getElementById('village-list');
            villageList.innerHTML = '';
            
            let currentDate = '';
            const filteredVillages = villages.filter(village => {
                if (currentFilter === 'all') return true;
                return village.status === currentFilter;
            });
            
            filteredVillages.forEach((village, index) => {
                // Add date header if it's a new date
                if (village.date !== currentDate) {
                    currentDate = village.date;
                    const dateHeader = document.createElement('div');
                    dateHeader.className = 'bg-blue-100 rounded-lg p-3 mb-2';
                    dateHeader.innerHTML = `
                        <h3 class="font-semibold text-blue-800 text-lg">${village.date}</h3>
                    `;
                    villageList.appendChild(dateHeader);
                }
                
                // Create village card
                const villageCard = document.createElement('div');
                villageCard.className = `bg-white rounded-lg shadow-md p-4 ml-4 fade-in ${village.status === 'pending' ? 'border-l-4 border-yellow-400' : 'border-l-4 border-green-400'}`;
                villageCard.style.animationDelay = `${index * 0.05}s`;
                
                const statusIcon = village.status === 'completed' ? '✅' : '⏳';
                const statusText = village.status === 'completed' ? 'Selesai' : 'Dalam Perbaikan';
                const statusColor = village.status === 'completed' ? 'text-green-600' : 'text-yellow-600';
                
                villageCard.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <span class="text-2xl">${statusIcon}</span>
                            <div>
                                <h4 class="font-semibold text-gray-800">
                                    ${village.number ? `${village.number}. ` : ''}${village.name}
                                </h4>
                                ${village.note ? `<p class="text-sm text-gray-600 mt-1">${village.note}</p>` : ''}
                            </div>
                        </div>
                        <span class="px-3 py-1 rounded-full text-sm font-medium ${statusColor} bg-opacity-10 ${village.status === 'completed' ? 'bg-green-100' : 'bg-yellow-100'}">
                            ${statusText}
                        </span>
                    </div>
                `;
                
                villageList.appendChild(villageCard);
            });
        }

        function filterByStatus(status) {
            currentFilter = status;
            
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-blue-600', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-700');
            });
            
            event.target.classList.remove('bg-gray-200', 'text-gray-700');
            event.target.classList.add('active', 'bg-blue-600', 'text-white');
            
            renderVillages();
        }

        function shareToWhatsApp() {
            const completed = villages.filter(v => v.status === 'completed').length;
            const pending = villages.filter(v => v.status === 'pending').length;
            const total = villages.length;
            const progressPercent = ((completed / total) * 100).toFixed(1);
            
            const message = `📊 *LAPORAN SK POSBANKUM KABUPATEN DONGGALA*

✅ Desa Selesai: ${completed}
⏳ Dalam Perbaikan: ${pending}
📈 Total Desa: ${total}
🎯 Progress: 109/167

🔥 Ayoo kita gas terus Bapak/Ibu! 

Detail lengkap dapat dilihat di aplikasi.

Info selengkapnya: https://syam.digital/posbankum

(Mohon disampaikan apabila ada kesalahan dalam penulisan nama Desa 🙏)`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/?text=${encodedMessage}`;
            
            window.open(whatsappUrl, '_blank', 'noopener,noreferrer');
        }

        async function onConfigChange(config) {
            const mainTitle = config.main_title || defaultConfig.main_title;
            const subtitle = config.subtitle || defaultConfig.subtitle;
            const footerMessage = config.footer_message || defaultConfig.footer_message;

            document.getElementById('main-title').textContent = mainTitle;
            document.getElementById('subtitle').textContent = subtitle;
            document.getElementById('footer-message').textContent = footerMessage;
        }

        // Initialize the app
        document.addEventListener('DOMContentLoaded', function() {
            renderVillages();
            
            if (window.elementSdk) {
                window.elementSdk.init({
                    defaultConfig: defaultConfig,
                    onConfigChange: onConfigChange,
                    mapToCapabilities: (config) => ({
                        recolorables: [],
                        borderables: [],
                        fontEditable: undefined,
                        fontSizeable: undefined
                    }),
                    mapToEditPanelValues: (config) => new Map([
                        ["main_title", config.main_title || defaultConfig.main_title],
                        ["subtitle", config.subtitle || defaultConfig.subtitle],
                        ["footer_message", config.footer_message || defaultConfig.footer_message]
                    ])
                });
            }
