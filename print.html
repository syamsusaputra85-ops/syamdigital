        }

            }
            .document-page {
                box-shadow: none;
                margin: 0;
                width: 100% !important;
                height: 100% !important;

</head>

            <!-- Document Canvas -->

                         onclick="handleCanvasClick(event)"

    <script>
        let currentZoom = 1;
        let selectedElement = null;
        let elementCounter = 0;

        function selectElement(element) {
            // Remove previous selection
            if (selectedElement) {
                selectedElement.style.outline = 'none';
                removeResizeHandles();
            }
            
            // Select new element
            selectedElement = element;
            element.style.outline = '2px solid #3b82f6';
            element.focus();
            
            // Show/hide photo controls based on selected element
            const photoControls = document.getElementById('photoControls');
            if (element.tagName === 'IMG') {
                photoControls.style.display = 'block';
            } else {
                photoControls.style.display = 'none';
            }
            
            // Add resize handles for text elements
            if (element.contentEditable === 'true') {
                addResizeHandles(element);
            }
        }

        function handleCanvasClick(event) {
            if (event.target.id === 'documentCanvas') {
                // Clicked on empty canvas area
                if (selectedElement) {
                    selectedElement.style.outline = 'none';
                    selectedElement = null;
                }
                // Hide photo controls when nothing is selected
                document.getElementById('photoControls').style.display = 'none';
                // Remove resize handles
                removeResizeHandles();
            }
        }

        function addResizeHandles(element) {
            // Remove existing handles first
            removeResizeHandles();
            
            const handles = ['nw', 'ne', 'sw', 'se', 'n', 's', 'e', 'w'];
            
            handles.forEach(position => {
                const handle = document.createElement('div');
                handle.className = 'resize-handle resize-handle-' + position;
                handle.style.cssText = `
                    position: absolute;
                    background: #3b82f6;
                    border: 2px solid white;
                    width: 8px;
                    height: 8px;
                    cursor: ${getCursor(position)};
                    z-index: 1000;
                `;
                
                // Position the handle
                positionHandle(handle, element, position);
                
                // Add resize functionality
                addResizeListener(handle, element, position);
                
                document.body.appendChild(handle);
            });
        }

        function removeResizeHandles() {
            const handles = document.querySelectorAll('.resize-handle');
            handles.forEach(handle => handle.remove());
        }

        function getCursor(position) {
            const cursors = {
                'nw': 'nw-resize',
                'ne': 'ne-resize',
                'sw': 'sw-resize',
                'se': 'se-resize',
                'n': 'n-resize',
                's': 's-resize',
                'e': 'e-resize',
                'w': 'w-resize'
            };
            return cursors[position];
        }

        function positionHandle(handle, element, position) {
            const canvas = document.getElementById('documentCanvas');
            const canvasRect = canvas.getBoundingClientRect();
            const elementRect = element.getBoundingClientRect();
            
            // Calculate position relative to viewport, then adjust for canvas position
            const elementLeft = elementRect.left - canvasRect.left + canvas.scrollLeft;
            const elementTop = elementRect.top - canvasRect.top + canvas.scrollTop;
            const elementWidth = elementRect.width;
            const elementHeight = elementRect.height;
            
            // Position handles exactly at the element edges
            switch(position) {
                case 'nw':
                    handle.style.left = (canvasRect.left + elementLeft - 4) + 'px';
                    handle.style.top = (canvasRect.top + elementTop - 4) + 'px';
                    break;
                case 'ne':
                    handle.style.left = (canvasRect.left + elementLeft + elementWidth - 4) + 'px';
                    handle.style.top = (canvasRect.top + elementTop - 4) + 'px';
                    break;
                case 'sw':
                    handle.style.left = (canvasRect.left + elementLeft - 4) + 'px';
                    handle.style.top = (canvasRect.top + elementTop + elementHeight - 4) + 'px';
                    break;
                case 'se':
                    handle.style.left = (canvasRect.left + elementLeft + elementWidth - 4) + 'px';
                    handle.style.top = (canvasRect.top + elementTop + elementHeight - 4) + 'px';
                    break;
                case 'n':
                    handle.style.left = (canvasRect.left + elementLeft + elementWidth/2 - 4) + 'px';
                    handle.style.top = (canvasRect.top + elementTop - 4) + 'px';
                    break;
                case 's':
                    handle.style.left = (canvasRect.left + elementLeft + elementWidth/2 - 4) + 'px';
                    handle.style.top = (canvasRect.top + elementTop + elementHeight - 4) + 'px';
                    break;
                case 'e':
                    handle.style.left = (canvasRect.left + elementLeft + elementWidth - 4) + 'px';
                    handle.style.top = (canvasRect.top + elementTop + elementHeight/2 - 4) + 'px';
                    break;
                case 'w':
                    handle.style.left = (canvasRect.left + elementLeft - 4) + 'px';
                    handle.style.top = (canvasRect.top + elementTop + elementHeight/2 - 4) + 'px';
                    break;
            }
        }

        function addResizeListener(handle, element, position) {
            let isResizing = false;
            let startX, startY, startWidth, startHeight, startLeft, startTop;
            
            handle.addEventListener('mousedown', function(e) {
                isResizing = true;
                startX = e.clientX;
                startY = e.clientY;
                
                const rect = element.getBoundingClientRect();
                startWidth = rect.width;
                startHeight = rect.height;
                startLeft = parseInt(element.style.left) || 0;
                startTop = parseInt(element.style.top) || 0;
                
                e.preventDefault();
                e.stopPropagation();
            });
            
            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;
                
                const deltaX = e.clientX - startX;
                const deltaY = e.clientY - startY;
                
                let newWidth = startWidth;
                let newHeight = startHeight;
                let newLeft = startLeft;
                let newTop = startTop;
                
                // Calculate new dimensions based on handle position
                switch(position) {
                    case 'se':
                        newWidth = Math.max(50, startWidth + deltaX);
                        newHeight = Math.max(20, startHeight + deltaY);
                        break;
                    case 'sw':
                        newWidth = Math.max(50, startWidth - deltaX);
                        newHeight = Math.max(20, startHeight + deltaY);
                        newLeft = startLeft + deltaX;
                        break;
                    case 'ne':
                        newWidth = Math.max(50, startWidth + deltaX);
                        newHeight = Math.max(20, startHeight - deltaY);
                        newTop = startTop + deltaY;
                        break;
                    case 'nw':
                        newWidth = Math.max(50, startWidth - deltaX);
                        newHeight = Math.max(20, startHeight - deltaY);
                        newLeft = startLeft + deltaX;
                        newTop = startTop + deltaY;
                        break;
                    case 'e':
                        newWidth = Math.max(50, startWidth + deltaX);
                        break;
                    case 'w':
                        newWidth = Math.max(50, startWidth - deltaX);
                        newLeft = startLeft + deltaX;
                        break;
                    case 's':
                        newHeight = Math.max(20, startHeight + deltaY);
                        break;
                    case 'n':
                        newHeight = Math.max(20, startHeight - deltaY);
                        newTop = startTop + deltaY;
                        break;
                }
                
                // Apply new dimensions
                element.style.width = newWidth + 'px';
                element.style.height = newHeight + 'px';
                element.style.maxWidth = newWidth + 'px';
                element.style.left = newLeft + 'px';
                element.style.top = newTop + 'px';
                
                // Update handle positions
                updateHandlePositions(element);
            });
            
            document.addEventListener('mouseup', function() {
                if (isResizing) {
                    isResizing = false;
                }
            });
        }

        function updateHandlePositions(element) {
            const handles = document.querySelectorAll('.resize-handle');
            handles.forEach(handle => {
                const position = handle.className.split('resize-handle-')[1];
                positionHandle(handle, element, position);
            });
        }

        function addText() {
            const canvas = document.getElementById('documentCanvas');
            const textElement = document.createElement('p');
            textElement.contentEditable = true;
            textElement.className = 'text-gray-700 leading-relaxed mb-4 cursor-text absolute border border-transparent';
            textElement.style.left = '50px';
            textElement.style.top = '100px';
            textElement.style.width = '300px';
            textElement.style.height = '60px';
            textElement.style.maxWidth = '300px';
            textElement.style.padding = '8px';
            textElement.style.overflow = 'hidden';
            textElement.textContent = 'Teks baru - klik untuk mengedit';
            textElement.onclick = (e) => {
                e.stopPropagation();
                selectElement(textElement);
            };
            
            // Add drag functionality
            makeDraggable(textElement);
            
            canvas.appendChild(textElement);
            selectElement(textElement);
        }

        function addTitle() {
            const canvas = document.getElementById('documentCanvas');
            const titleElement = document.createElement('h2');
            titleElement.contentEditable = true;
            titleElement.className = 'text-2xl font-bold text-gray-800 mb-4 cursor-text absolute border border-transparent';
            titleElement.style.left = '50px';
            titleElement.style.top = '50px';
            titleElement.style.width = '400px';
            titleElement.style.height = '50px';
            titleElement.style.maxWidth = '400px';
            titleElement.style.padding = '8px';
            titleElement.style.overflow = 'hidden';
            titleElement.textContent = 'Judul Baru';
            titleElement.onclick = (e) => {
                e.stopPropagation();
                selectElement(titleElement);
            };
            
            // Add drag functionality
            makeDraggable(titleElement);
            
            canvas.appendChild(titleElement);
            selectElement(titleElement);
        }

        function makeDraggable(element) {
            let isDragging = false;
            let startX, startY, initialX, initialY;
            
            element.addEventListener('mousedown', function(e) {
                // Only start dragging if not editing text
                if (e.target.contentEditable === 'true' && e.target === document.activeElement) {
                    return;
                }
                
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                initialX = parseInt(element.style.left) || 0;
                initialY = parseInt(element.style.top) || 0;
                
                element.style.cursor = 'grabbing';
                e.preventDefault();
            });
            
            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                
                const deltaX = e.clientX - startX;
                const deltaY = e.clientY - startY;
                
                const newX = initialX + deltaX;
                const newY = initialY + deltaY;
                
                // Keep element within canvas bounds
                const canvas = document.getElementById('documentCanvas');
                const canvasRect = canvas.getBoundingClientRect();
                const elementRect = element.getBoundingClientRect();
                
                const maxX = canvas.offsetWidth - element.offsetWidth;
                const maxY = canvas.offsetHeight - element.offsetHeight;
                
                element.style.left = Math.max(0, Math.min(newX, maxX)) + 'px';
                element.style.top = Math.max(0, Math.min(newY, maxY)) + 'px';
            });
            
            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    element.style.cursor = element.contentEditable === 'true' ? 'text' : 'move';
                }
            });
        }

        function addRectangle() {
            const canvas = document.getElementById('documentCanvas');
            const rect = document.createElement('div');
            rect.className = 'w-32 h-20 bg-blue-200 border-2 border-blue-400 mb-4 cursor-move absolute';
            rect.style.left = '100px';
            rect.style.top = '150px';
            rect.onclick = (e) => {
                e.stopPropagation();
                selectElement(rect);
            };
            
            makeDraggable(rect);
            canvas.appendChild(rect);
            selectElement(rect);
        }

        function addCircle() {
            const canvas = document.getElementById('documentCanvas');
            const circle = document.createElement('div');
            circle.className = 'w-20 h-20 bg-green-200 border-2 border-green-400 rounded-full mb-4 cursor-move absolute';
            circle.style.left = '150px';
            circle.style.top = '200px';
            circle.onclick = (e) => {
                e.stopPropagation();
                selectElement(circle);
            };
            
            makeDraggable(circle);
            canvas.appendChild(circle);
            selectElement(circle);
        }

        function changeFontFamily() {
            if (selectedElement) {
                const fontFamily = document.getElementById('fontSelect').value;
                selectedElement.style.fontFamily = fontFamily;
            }
        }

        function changeFontSize() {
            if (selectedElement) {
                const fontSize = document.getElementById('fontSizeSelect').value;
                selectedElement.style.fontSize = fontSize + 'px';
            }
        }

        function toggleBold() {
            if (selectedElement) {
                const isBold = selectedElement.style.fontWeight === 'bold';
                selectedElement.style.fontWeight = isBold ? 'normal' : 'bold';
                document.getElementById('boldBtn').classList.toggle('active-tool', !isBold);
            }
        }

        function toggleItalic() {
            if (selectedElement) {
                const isItalic = selectedElement.style.fontStyle === 'italic';
                selectedElement.style.fontStyle = isItalic ? 'normal' : 'italic';
                document.getElementById('italicBtn').classList.toggle('active-tool', !isItalic);
            }
        }

        function toggleUnderline() {
            if (selectedElement) {
                const isUnderlined = selectedElement.style.textDecoration === 'underline';
                selectedElement.style.textDecoration = isUnderlined ? 'none' : 'underline';
                document.getElementById('underlineBtn').classList.toggle('active-tool', !isUnderlined);
            }
        }

        function alignText(alignment) {
            if (selectedElement) {
                // Remove active state from all alignment buttons
                document.getElementById('alignLeftBtn').classList.remove('active-tool');
                document.getElementById('alignCenterBtn').classList.remove('active-tool');
                document.getElementById('alignRightBtn').classList.remove('active-tool');
                
                // Apply alignment
                selectedElement.style.textAlign = alignment;
                
                // Add active state to current button
                const buttonId = 'align' + alignment.charAt(0).toUpperCase() + alignment.slice(1) + 'Btn';
                document.getElementById(buttonId).classList.add('active-tool');
            } else {
                alert('Pilih teks terlebih dahulu untuk mengatur alignment!');
            }
        }

        function zoomIn() {
            currentZoom = Math.min(currentZoom + 0.1, 2);
            updateZoom();
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom - 0.1, 0.5);
            updateZoom();
        }

        function updateZoom() {
            const canvas = document.getElementById('documentCanvas');
            canvas.style.transform = `scale(${currentZoom})`;
            document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
        }

        function undo() {
            document.execCommand('undo');
        }

        function redo() {
            document.execCommand('redo');
        }

        function saveDocument() {
            try {
                // Get document content
                const canvas = document.getElementById('documentCanvas');
                const documentData = {
                    title: document.querySelector('h1').textContent || 'Dokumen Tanpa Judul',
                    content: canvas.innerHTML,
                    timestamp: new Date().toISOString(),
                    zoom: currentZoom
                };
                
                // Save to localStorage
                const savedDocs = JSON.parse(localStorage.getItem('mediaprint_documents') || '[]');
                const docId = 'doc_' + Date.now();
                documentData.id = docId;
                savedDocs.push(documentData);
                localStorage.setItem('mediaprint_documents', JSON.stringify(savedDocs));
                
                // Also create downloadable HTML file
                const htmlContent = generateFullHTML();
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${documentData.title.replace(/[^a-z0-9]/gi, '_')}.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                alert('✅ Dokumen berhasil disimpan dan diunduh sebagai file HTML!');
            } catch (error) {
                console.error('Error saving document:', error);
                alert('❌ Terjadi kesalahan saat menyimpan dokumen.');
            }
        }

        function generateFullHTML() {
            const canvas = document.getElementById('documentCanvas');
            const title = document.querySelector('h1').textContent || 'Dokumen';
            
            return '<!DOCTYPE html>' +
'<html lang="id">' +
'<head>' +
'    <meta charset="UTF-8">' +
'    <meta name="viewport" content="width=device-width, initial-scale=1.0">' +
'    <title>' + title + '</title>' +
'    <script src="https://cdn.tailwindcss.com"><\/script>' +
'    <style>' +
'        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");' +
'        body { font-family: "Inter", sans-serif; }' +
'        .document-page { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); }' +
'        @media print {' +
'            body { margin: 0; }' +
'            .document-page { box-shadow: none; margin: 0; width: 100% !important; height: 100% !important; }' +
'        }' +
'    </style>' +
'</head>' +
'<body class="bg-gray-50 min-h-screen p-8">' +
'    <div class="flex justify-center">' +
'        <div class="document-page bg-white w-full max-w-2xl min-h-[297mm] relative">' +
            canvas.innerHTML +
'        </div>' +
'    </div>' +
'    <div class="text-center mt-4 no-print">' +
'        <button onclick="window.print()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium no-print">' +
'            🖨️ Print Dokumen' +
'        </button>' +
'    </div>' +
'</body>' +
'</html>';
        }

        function printDocument() {
            try {
                // Create a clean print version
                const printWindow = window.open('', '_blank');
                if (!printWindow) {
                    alert('Pop-up diblokir! Silakan izinkan pop-up untuk fitur print.');
                    return;
                }
                
                const htmlContent = generateFullHTML();
                printWindow.document.write(htmlContent);
                printWindow.document.close();
                
                // Wait for content to load then print
                printWindow.onload = function() {
                    setTimeout(() => {
                        printWindow.print();
                    }, 500);
                };
            } catch (error) {
                console.error('Print error:', error);
                // Fallback to regular print
                window.print();
            }
        }

        function deleteSelected() {
            if (selectedElement) {
                // Don't allow deleting the main document container
                if (selectedElement.id === 'documentCanvas') {
                    alert('Tidak dapat menghapus area dokumen utama!');
                    return;
                }
                
                // Confirm deletion
                if (confirm('Apakah Anda yakin ingin menghapus elemen yang dipilih?')) {
                    selectedElement.remove();
                    selectedElement = null;
                }
            } else {
                alert('Pilih elemen yang ingin dihapus terlebih dahulu!');
            }
        }

        function clearDocument() {
            if (confirm('Apakah Anda yakin ingin mengosongkan seluruh dokumen? Semua konten akan dihapus dan tidak dapat dikembalikan.')) {
                const canvas = document.getElementById('documentCanvas');
                // Clear all content and reset to empty state
                canvas.innerHTML = '';
                
                // Add basic padding container for new content
                const paddingDiv = document.createElement('div');
                paddingDiv.className = 'p-8 min-h-full';
                canvas.appendChild(paddingDiv);
                
                selectedElement = null;
                alert('✅ Dokumen berhasil dikosongkan!');
            }
        }

        function insertPhoto() {
            document.getElementById('photoInput').click();
        }

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        addPhotoToCanvas(e.target.result);
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert('Silakan pilih file gambar yang valid (JPG, PNG, GIF, dll.)');
                }
            }
        }

        function addPhotoToCanvas(imageSrc) {
            const canvas = document.getElementById('documentCanvas');
            const imgElement = document.createElement('img');
            
            imgElement.src = imageSrc;
            imgElement.className = 'max-w-xs h-auto mb-4 cursor-move border-2 border-transparent hover:border-blue-300 transition-colors';
            imgElement.style.maxWidth = '300px';
            imgElement.style.height = 'auto';
            imgElement.style.position = 'absolute';
            imgElement.style.left = '50px';
            imgElement.style.top = '200px';
            imgElement.draggable = true;
            
            imgElement.onclick = (e) => {
                e.stopPropagation();
                selectElement(imgElement);
            };
            
            // Add drag functionality
            imgElement.addEventListener('dragstart', function(e) {
                const rect = imgElement.getBoundingClientRect();
                const canvasRect = canvas.getBoundingClientRect();
                e.dataTransfer.setData('text/plain', '');
                e.dataTransfer.effectAllowed = 'move';
                
                // Store offset from mouse to element corner
                imgElement.dragOffsetX = e.clientX - rect.left;
                imgElement.dragOffsetY = e.clientY - rect.top;
            });
            
            imgElement.addEventListener('dragend', function(e) {
                const canvasRect = canvas.getBoundingClientRect();
                const newX = e.clientX - canvasRect.left - imgElement.dragOffsetX;
                const newY = e.clientY - canvasRect.top - imgElement.dragOffsetY;
                
                // Keep image within canvas bounds
                const maxX = canvas.offsetWidth - imgElement.offsetWidth;
                const maxY = canvas.offsetHeight - imgElement.offsetHeight;
                
                imgElement.style.left = Math.max(0, Math.min(newX, maxX)) + 'px';
                imgElement.style.top = Math.max(0, Math.min(newY, maxY)) + 'px';
            });
            
            // Add resize handles when selected
            imgElement.onload = function() {
                canvas.appendChild(imgElement);
                selectElement(imgElement);
            };
            
            // Handle image load errors
            imgElement.onerror = function() {
                alert('Gagal memuat gambar. Silakan coba lagi dengan file yang berbeda.');
            };
        }

        function allowDrop(event) {
            event.preventDefault();
        }

        function handleDrop(event) {
            event.preventDefault();
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key) {
                    case 's':
                        e.preventDefault();
                        saveDocument();
                        break;
                    case 'p':
                        e.preventDefault();
                        printDocument();
                        break;
                    case 'z':
                        if (e.shiftKey) {
                            e.preventDefault();
                            redo();
                        } else {
                            e.preventDefault();
                            undo();
                        }
                        break;
                }
            } else if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedElement && selectedElement.id !== 'documentCanvas') {
                    e.preventDefault();
                    deleteSelected();
                }
            }
        });

        // Photo resize functions
        function resizePhoto(direction) {
            if (selectedElement && selectedElement.tagName === 'IMG') {
                const currentWidth = selectedElement.offsetWidth;
                let newWidth;
                
                if (direction === 'larger') {
                    newWidth = Math.min(currentWidth + 50, 600); // Max 600px
                } else {
                    newWidth = Math.max(currentWidth - 50, 100); // Min 100px
                }
                
                selectedElement.style.maxWidth = newWidth + 'px';
                selectedElement.style.width = newWidth + 'px';
            } else {
                alert('Pilih foto terlebih dahulu untuk mengubah ukuran!');
            }
        }
        
        function setPhotoSize(size) {
            if (selectedElement && selectedElement.tagName === 'IMG') {
                let width;
                
                switch(size) {
                    case 'tiny':
                        width = 100;
                        break;
                    case 'small':
                        width = 180;
                        break;
                    case 'medium':
                        width = 280;
                        break;
                    case 'large':
                        width = 400;
                        break;
                    case 'xlarge':
                        width = 520;
                        break;
                    case 'full':
                        width = 650;
                        break;
                    default:
                        width = 280;
                }
                
                selectedElement.style.maxWidth = width + 'px';
                selectedElement.style.width = width + 'px';
            } else {
                alert('Pilih foto terlebih dahulu untuk mengubah ukuran!');
            }
        }

        // Initialize the editor when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Media Print Editor loaded successfully!');
        });
    </script>
